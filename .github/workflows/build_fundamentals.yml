name: Build Fundamentals Data

on:
  schedule:
    - cron: '0 21 * * 5'  # 9 PM UTC = 5 PM EDT every Friday
  workflow_dispatch:       # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install finvizfinance
        run: pip install finvizfinance

      - name: Build fundamentals data
        run: python scripts/fetch_fundamentals.py --snapshot-path data/snapshot.json --out-dir data

      - name: Commit and push fundamentals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fundamentals.json
          git diff --staged --quiet || git commit -m "refresh fundamentals"
          git pull --rebase origin main
          git push
