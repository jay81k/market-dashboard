    function buildScansHeader() {
        var dmaTooltip = '% distance from ' + activeMAType + activeMALength;
        var cols = [
            { key:'symbol',    label:'Ticker',  tip:'Ticker symbol' },
            { key:'industry',  label:'Industry',tip:'Industry' },
            { key:'price',     label:'Price',   tip:'Last closing price' },
            { key:'rs',        label:'RS',      tip:'RS Percentile (1-99)' },
            { key:'daily',     label:'Day',     tip:'Daily return' },
            { key:'1w',        label:'1W',      tip:'5-day return' },
            { key:'1m',        label:'1M',      tip:'21-day return' },
            { key:'3m',        label:'3M',      tip:'63-day return' },
            { key:'ytd',       label:'YTD',     tip:'Year-to-date return' },
            { key:'vs_spy',    label:'vs 1M',   tip:'1M return vs SPY' },
            { key:'dist_ma',   label:'Dist/MA', tip:dmaTooltip, extra:'<span class="dist-ma-btn" onclick="event.stopPropagation();toggleDistMA(this)">⋯</span>' },
            { key:'avg_vol',   label:'Avg Vol', tip:'50-day average volume' },
            { key:'pct_52wk',  label:'52Wk%',   tip:'% from 52-week high' },
            { key:'adr_pct',   label:'ADR%',    tip:'Avg Daily Range %' },
            { key:'cr',        label:'CR',      tip:'Closing range (100=high, 0=low)' },
        ];
        var html = '<tr>';
        cols.forEach(function(c) {
            var sorted = scansSortState.by === c.key;
            var cl = sorted ? (' sorted ' + (scansSortState.dir === -1 ? 'sort-desc' : 'sort-asc')) : '';
            html += '<th class="sortable' + cl + '" data-sort-by="' + c.key + '" data-tooltip="' + esc(c.tip) + '">' + c.label + (c.extra||'') + '</th>';
        });
        html += '</tr>';
        document.getElementById('scans-thead').innerHTML = html;

        document.getElementById('scans-thead').querySelectorAll('th[data-sort-by]').forEach(function(th) {
            th.addEventListener('click', function() {
                var key = this.getAttribute('data-sort-by');
                if (scansSortState.by === key) { scansSortState.dir *= -1; }
                else { scansSortState.by = key; scansSortState.dir = -1; }
                renderScans();
            });
        });
    }

    function renderScans() {
        var stocks = getAllStocks();
        var filtered = activeScan
            ? stocks.filter(function(r) { return r[activeScan] === true; })
            : stocks.slice();
        filtered = applyFilters(filtered);

        // Sort
        filtered.sort(function(a, b) {
            var key = scansSortState.by;
            var av, bv;
            if (key === 'symbol')   { av = a.ticker;    bv = b.ticker;    return av < bv ? scansSortState.dir : av > bv ? -scansSortState.dir : 0; }
            if (key === 'sector')   { av = a.sector;    bv = b.sector;    return av < bv ? scansSortState.dir : av > bv ? -scansSortState.dir : 0; }
            if (key === 'industry') { av = a.industry;  bv = b.industry;  return av < bv ? scansSortState.dir : av > bv ? -scansSortState.dir : 0; }
            if (key === 'rs')       { av = a.Percentile; bv = b.Percentile; }
            else if (key === 'price')    { av = a.price;     bv = b.price; }
            else if (key === 'daily')    { av = a.daily;     bv = b.daily; }
            else if (key === '1w')       { av = a['1w'];     bv = b['1w']; }
            else if (key === '1m')       { av = a['1m'];     bv = b['1m']; }
            else if (key === '3m')       { av = a['3m'];     bv = b['3m']; }
            else if (key === 'ytd')      { av = a.ytd;       bv = b.ytd; }
            else if (key === 'vs_spy')   { av = a.vs_spy;    bv = b.vs_spy; }
            else if (key === 'avg_vol')  { av = a.AvgVol50;  bv = b.AvgVol50; }
            else if (key === 'pct_52wk') { av = a.PctFrom52WkHigh; bv = b.PctFrom52WkHigh; }
            else if (key === 'adr_pct')  { av = a.adr_pct;   bv = b.adr_pct; }
            else if (key === 'cr')       { av = a.cr;        bv = b.cr; }
            else if (key === 'dist_ma')  { av = a.dist_ma ? a.dist_ma[activeMAType+activeMALength] : null; bv = b.dist_ma ? b.dist_ma[activeMAType+activeMALength] : null; }
            else { av = null; bv = null; }
            if (av == null && bv == null) return 0;
            if (av == null) return 1;
            if (bv == null) return -1;
            return (av - bv) * scansSortState.dir;
        });

        scansMcTickers = filtered.map(function(r) { return r.ticker; });
        document.getElementById('scans-result-count').textContent = filtered.length + ' stocks';

        buildScansHeader();

        var html = '';
        filtered.forEach(function(row) {
            var rsVal = row.Percentile != null ? row.Percentile : '—';
            var priceVal = row.price != null ? '$' + row.price.toFixed(2) : '—';
            var distVal = (row.dist_ma && row.dist_ma[activeMAType+activeMALength] != null) ? row.dist_ma[activeMAType+activeMALength] : null;
            var distAll = row.dist_ma || {};
            var adrVal = row.adr_pct != null ? row.adr_pct.toFixed(1)+'%' : '—';
            var volVal = '—';
            if (row.AvgVol50 != null) {
                var v = row.AvgVol50;
                volVal = v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v.toFixed(0);
            }
            var adrColor = '#484f58';
            if (row.adr_pct != null) {
                if (row.adr_pct < 4) adrColor = '#3fb950';
                else if (row.adr_pct < 8) adrColor = '#e3852b';
                else adrColor = '#f85149';
            }
            var crVal = row.cr != null ? Math.round(row.cr)+'%' : '—';
            var secCl = sectorClass(row.sector);

            var isAdded = selectedScans.has(row.ticker);
            html += '<tr class="stock-row" data-symbol="' + esc(row.ticker) + '" data-sector="' + esc(row.sector||'') + '" data-industry="' + esc(row.industry||'') + '">';
            var addIcon = isAdded
                ? '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#3fb950" stroke-width="2.2"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>'
                : '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#484f58" stroke-width="2"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>';
            html += '<td onclick="event.stopPropagation()" style="white-space:nowrap;">' +
                '<button class="scan-add-btn' + (isAdded ? ' added' : '') + '" data-ticker="' + esc(row.ticker) + '" onclick="event.stopPropagation();sfToggleAdd(this)">' + addIcon + '</button>' +
                '<span class="ticker-badge">' + esc(row.ticker) + '</span>' +
                '</td>';
            html += '<td style="font-size:0.858em;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(row.industry||'—') + '</td>';
            html += '<td style="color:#c8d0dc;font-weight:500;">' + priceVal + '</td>';
            html += '<td style="color:#c8d0dc;font-weight:600;">' + rsVal + '</td>';
            html += '<td class="' + cc(row.daily)     + '">' + (row.daily     != null ? fmt(row.daily,2,'%')     : '—') + '</td>';
            html += '<td class="' + cc(row['1w'])     + '">' + (row['1w']     != null ? fmt(row['1w'],2,'%')     : '—') + '</td>';
            html += '<td class="' + cc(row['1m'])     + '">' + (row['1m']     != null ? fmt(row['1m'],2,'%')     : '—') + '</td>';
            html += '<td class="' + cc(row['3m'])     + '">' + (row['3m']     != null ? fmt(row['3m'],2,'%')     : '—') + '</td>';
            html += '<td class="' + cc(row.ytd)       + '">' + (row.ytd       != null ? fmt(row.ytd,2,'%')       : '—') + '</td>';
            html += '<td class="' + cc(row.vs_spy)    + '">' + (row.vs_spy    != null ? fmt(row.vs_spy,2,'%')    : '—') + '</td>';
            html += '<td class="dist-ma-cell" data-dist-all="' + esc(JSON.stringify(distAll)) + '"></td>';
            html += '<td style="color:#8b949e;">' + volVal + '</td>';
            var pct52Val = '—';
            var pct52Color = '#484f58';
            if (row.PctFrom52WkHigh != null) {
                pct52Val = (row.PctFrom52WkHigh > 0 ? '+' : '') + row.PctFrom52WkHigh.toFixed(1) + '%';
                pct52Color = row.PctFrom52WkHigh >= -5 ? '#3fb950' : row.PctFrom52WkHigh >= -15 ? '#e3852b' : '#f85149';
            }
            html += '<td><span style="color:' + pct52Color + ';font-weight:600;">' + pct52Val + '</span></td>';
            html += '<td><span style="color:' + adrColor + ';font-weight:600;">' + adrVal + '</span></td>';
            var crColor = '#484f58';
            if (row.cr != null) { if (row.cr >= 60) crColor = '#3fb950'; else if (row.cr >= 30) crColor = '#e3852b'; else crColor = '#f85149'; }
            html += '<td><span style="color:' + crColor + ';font-weight:600;">' + crVal + '</span></td>';
            html += '</tr>';
        });

        var scansTbody = document.getElementById('scans-tbody');
        scansTbody.innerHTML = html;
        applyDistMA(document.getElementById('scans-table'));

        // Wire keyboard nav
        allStockRows = Array.from(scansTbody.querySelectorAll('.stock-row'));
        currentStockIndex = -1;

        scansTbody.onclick = function(e) {
            var row = e.target.closest('.stock-row');
            if (!row || e.target.classList.contains('scan-add-btn')) return;
            scansTbody.querySelectorAll('.stock-row.active').forEach(function(r){ r.classList.remove('active'); });
            row.classList.add('active');
            allStockRows = Array.from(scansTbody.querySelectorAll('.stock-row'));
            currentStockIndex = allStockRows.indexOf(row);
        };

        if (scansMultichartActive) renderScansMc();
    }

    // ── Scans search filter ───────────────────────────────────────────────
    function filterScansTable(q) {
        q = (q || '').toLowerCase();
        document.querySelectorAll('#scans-tbody .stock-row').forEach(function(row) {
            var sym = (row.getAttribute('data-symbol') || '').toLowerCase();
            row.style.display = (!q || sym.includes(q)) ? '' : 'none';
        });
    }

    // ── Scans Multichart ─────────────────────────────────────────────────
    window.toggleScansMultichart = function() {
        scansMultichartActive = !scansMultichartActive;
        document.getElementById('scans-table-view').style.display      = scansMultichartActive ? 'none' : 'flex';
        document.getElementById('scans-multichart-view').style.display = scansMultichartActive ? 'flex' : 'none';
        var btn = document.getElementById('scans-multichart-toggle-btn');
        btn.style.background  = scansMultichartActive ? '#1f3a5c' : '';
        btn.style.borderColor = scansMultichartActive ? '#388bfd' : '';
        btn.style.color       = scansMultichartActive ? '#58a6ff' : '';
        if (scansMultichartActive) renderScansMc();
    };

    window.setScansMcTf = function(tf) {
        scansMcTimeframe = tf;
        document.querySelectorAll('#scans-multichart-view .mc-tf-btn').forEach(function(b){
            b.classList.toggle('active', b.getAttribute('data-tf') === tf);
        });
        scansMcWidgets = {};
        renderScansMc();
    };

    function renderScansMc() {
        var grid = document.getElementById('scans-multichart-grid');
        if (!scansMcTickers.length) { grid.innerHTML = '<div style="color:#484f58;padding:20px;">No stocks.</div>'; return; }
        grid.innerHTML = '';
        scansMcWidgets = {};
        scansMcTickers.forEach(function(sym) {
            var cell = document.createElement('div');
            cell.className = 'mc-cell';
            cell.setAttribute('data-sym', sym);

            var label = document.createElement('div');
            label.className = 'mc-cell-label';
            label.textContent = sym;

            var hint = document.createElement('div');
            hint.className = 'mc-cell-hint';
            hint.textContent = 'click to expand';

            var chartDiv = document.createElement('div');
            chartDiv.id = 'sc-chart-' + sym.replace(/[^a-zA-Z0-9]/g,'_');
            chartDiv.style.cssText = 'width:100%;height:100%;';

            var overlay = document.createElement('div');
            overlay.className = 'mc-cell-overlay';
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                openMcFullscreen(sym);
            });

            cell.appendChild(label);
            cell.appendChild(hint);
            cell.appendChild(overlay);
            cell.appendChild(chartDiv);
            grid.appendChild(cell);

            var observer = new IntersectionObserver(function(entries) {
                if (!entries[0].isIntersecting) return;
                observer.disconnect();
                var mappedSym = TV_MAP[sym] || sym;
                try {
                    scansMcWidgets[sym] = new TradingView.widget({
                        symbol: mappedSym, interval: scansMcTimeframe, locale: 'en', style: '1',
                        theme: 'dark', timezone: 'America/Toronto',
                        toolbar_bg: '#161b22', backgroundColor: '#0d1117',
                        gridColor: 'rgba(255,255,255,0.04)',
                        hide_side_toolbar: true, hide_top_toolbar: true,
                        hide_legend: true, hide_volume: true,
                        withdateranges: false, allow_symbol_change: false,
                        save_image: false, enable_publishing: false,
                        studies: ['STD;MA%Ribbon', 'Volume@tv-basicstudies'],
                        right_bar_margin: 3,
                        autosize: true, container_id: chartDiv.id,
                    });
                } catch(e) {}
            }, { threshold: 0.1 });
            observer.observe(cell);
        });
    }

    // ── Load data ─────────────────────────────────────────────────────────
    Promise.all([
        fetch('data/snapshot.json').then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
        fetch('data/industries.json').then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
    ]).then(function(res) {
        snapshot       = res[0];
        industriesData = res[1];

        document.getElementById('loading-msg').style.display = 'none';

        // Sync DistMA buttons
        document.querySelectorAll('.dist-ma-type-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-type') === activeMAType); });
        document.querySelectorAll('.dist-ma-len-btn').forEach(function(b){ b.classList.toggle('active', parseInt(b.getAttribute('data-len')) === activeMALength); });

        showView('industries');

        // Scans dblclick — attached once on the static container
        document.getElementById('scans-table-view').addEventListener('dblclick', function(e) {
            var row = e.target.closest('.stock-row');
            if (!row) return;
            openChartModal(row.getAttribute('data-symbol'), row.getAttribute('data-sector')||'', row.getAttribute('data-industry')||'');
        });
    });
})();
</script>
</body>
</html>
