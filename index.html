<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c8d0dc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Top nav ── */
        .topnav {
            display: flex; align-items: center; gap: 0;
            background: #0d1117; border-bottom: 1px solid #21262d;
            padding: 0 16px; height: 44px; flex-shrink: 0;
        }
        .nav-tabs { display: flex; gap: 2px; }
        .nav-tab {
            padding: 0 20px; height: 44px; display: flex; align-items: center;
            font-size: 0.95em; font-weight: 600; color: #6e7681; cursor: pointer;
            border-bottom: 2px solid transparent; letter-spacing: 0.02em;
            transition: color 0.15s; user-select: none;
        }
        .nav-tab:hover { color: #c8d0dc; }
        .nav-tab.active { color: #c8d0dc; border-bottom-color: #378add; }

        /* ── Toolbar ── */
        .toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: #0d1117;
            border-bottom: 1px solid #21262d; flex-shrink: 0;
        }
        .search-input {
            background: #161b22; border: 1px solid #21262d; border-radius: 6px;
            color: #c8d0dc; padding: 5px 12px; font-size: 0.82em; outline: none;
            font-family: inherit; width: 220px;
        }
        .search-input::placeholder { color: #484f58; }
        .search-input:focus { border-color: #388bfd44; }

        .tf-group { display: flex; gap: 3px; }
        .tf-btn {
            padding: 4px 10px; border-radius: 5px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.78em;
            font-family: inherit; cursor: pointer; font-weight: 500; letter-spacing: 0.04em;
            transition: all 0.12s;
        }
        .tf-btn:hover { background: #161b22; color: #c8d0dc; }
        .tf-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        .perf-btn {
            padding: 4px 10px; border-radius: 5px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.78em;
            font-family: inherit; cursor: pointer; font-weight: 500; letter-spacing: 0.04em;
            transition: all 0.12s;
        }
        .perf-btn:hover { background: #161b22; color: #c8d0dc; }
        .perf-btn.active { background: #1a3a5c; border-color: #2979c8; color: #58a6ff; }

        .sort-group { display: flex; gap: 3px; }
        .sort-btn {
            padding: 4px 10px; border-radius: 5px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.78em;
            font-family: inherit; cursor: pointer; font-weight: 500;
            transition: all 0.12s;
        }
        .sort-btn:hover { background: #161b22; color: #c8d0dc; }
        .sort-btn.active { background: #161b22; border-color: #30363d; color: #c8d0dc; }

        .result-count { font-size: 0.75em; color: #484f58; margin-left: 4px; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .toolbar-divider { width: 1px; height: 16px; background: #21262d; flex-shrink: 0; }

        /* ── Main content ── */
        .main { flex: 1; overflow-y: auto; min-height: 0; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }

        /* ── Industries list ── */
        .industry-list { width: 100%; }
        .industry-row {
            display: flex; align-items: center; gap: 0;
            padding: 10px 16px; border-bottom: 1px solid #161b22;
            cursor: pointer; transition: background 0.1s;
        }
        .industry-row:hover { background: #161b22; }
        .industry-row:hover .industry-arrow { opacity: 1; }

        /* Fixed column widths — must match .ind-hdr-* exactly */
        .industry-rank   { font-size: 0.8em; color: #6e7681; width: 36px; flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; padding-right: 12px; }
        .industry-name   { font-size: 0.95em; font-weight: 500; color: #c8d0dc; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 16px; }
        .industry-sector { font-size: 0.78em; color: #8b949e; width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 12px; }
        .industry-count  { font-size: 0.78em; color: #6e7681; width: 36px; flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; padding-right: 16px; }

        /* Industries column headers */
        .ind-hdr-row {
            border-bottom: 1px solid #21262d; padding: 7px 16px;
            display: flex; align-items: center; gap: 0;
            position: sticky; top: 0; background: #0d1117; z-index: 1;
        }
        .ind-hdr-rank   { width: 36px; flex-shrink: 0; padding-right: 12px; }
        .ind-hdr-name   { flex: 1; min-width: 0; padding-right: 16px; }
        .ind-hdr-sector { width: 160px; flex-shrink: 0; padding-right: 12px; }
        .ind-hdr-count  { width: 36px; flex-shrink: 0; padding-right: 16px; }
        .ind-col-hdr {
            width: 76px; flex-shrink: 0; text-align: right;
            font-size: 0.75em; font-weight: 600; color: #6e7681;
            text-transform: uppercase; letter-spacing: 0.05em;
            cursor: pointer; user-select: none; transition: color 0.1s;
        }
        .ind-col-hdr:hover { color: #c8d0dc; }
        .ind-col-hdr.sorted { color: #388bfd; }
        .ind-col-hdr.sorted.asc::after  { content: ' ↑'; }
        .ind-col-hdr.sorted.desc::after { content: ' ↓'; }

        /* Performance & RS columns — width must match .ind-col-hdr */
        .industry-perf-cols { display: flex; align-items: center; flex-shrink: 0; }
        .industry-perf-col  { width: 76px; text-align: right; flex-shrink: 0; }
        .industry-perf-num  { font-size: 0.88em; font-weight: 600; font-variant-numeric: tabular-nums; }
        .industry-perf-num.up      { color: #3fb950; }
        .industry-perf-num.down    { color: #f85149; }
        .industry-perf-num.neutral { color: #484f58; }
        .industry-rs-cols { display: flex; align-items: center; flex-shrink: 0; }
        .industry-rs-col  { width: 76px; text-align: right; flex-shrink: 0; font-size: 0.88em; font-weight: 600; font-variant-numeric: tabular-nums; }
        .industry-rs-col.positive { color: #3fb950; }
        .industry-rs-col.negative { color: #f85149; }
        .industry-rs-col.neutral  { color: #484f58; }

        /* ── Multichart ── */
        .multichart-toolbar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 16px; background: #0d1117;
            border-bottom: 1px solid #21262d; flex-shrink: 0;
        }
        .mc-tf-btn {
            padding: 3px 9px; border-radius: 4px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.78em;
            font-family: inherit; cursor: pointer; font-weight: 500;
            transition: all 0.12s;
        }
        .mc-tf-btn:hover  { background: #161b22; color: #c8d0dc; }
        .mc-tf-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }
        .mc-label { font-size: 0.75em; color: #484f58; margin-right: 4px; }

        .multichart-grid {
            flex: 1; overflow-y: auto; min-height: 0;
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 4px; padding: 4px; background: #0d1117;
        }
        .mc-cell {
            background: #0d1117; border: 1px solid #21262d; border-radius: 4px;
            overflow: hidden; position: relative; height: 420px;
        }
        .mc-cell-label {
            position: absolute; top: 6px; left: 8px; z-index: 2;
            font-size: 0.78em; font-weight: 700; color: #58a6ff;
            background: rgba(13,17,23,0.75); padding: 1px 5px; border-radius: 3px;
            pointer-events: none;
        }

        /* ── Stocks view ── */
        .stocks-view { display: none; flex-direction: column; height: 100%; }
        .stocks-view.active { display: flex; }

        .stocks-header {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-bottom: 1px solid #21262d;
            background: #0d1117; flex-shrink: 0;
        }
        .back-btn {
            background: transparent; border: 1px solid #21262d; border-radius: 5px;
            color: #6e7681; font-size: 0.78em; padding: 4px 10px; cursor: pointer;
            font-family: inherit; transition: all 0.12s; display: flex; align-items: center; gap: 5px;
        }
        .back-btn:hover { background: #161b22; color: #c8d0dc; }
        .stocks-industry-name { font-size: 1.0em; font-weight: 600; color: #c8d0dc; }
        .stocks-industry-meta { font-size: 0.82em; color: #8b949e; }
        .stocks-rs-badge {
            margin-left: auto; font-size: 0.75em; font-weight: 600;
            background: #1f6feb22; color: #388bfd; border: 1px solid #1f6feb44;
            padding: 3px 8px; border-radius: 4px;
        }

        /* Stocks table */
        .stocks-table-wrap { flex: 1; overflow-y: auto; }
        .stocks-table { width: 100%; border-collapse: collapse; font-size: 0.95em; table-layout: fixed; }

        .stocks-table th:nth-child(1)  { width: 100px; }
        .stocks-table th:nth-child(2)  { width: 46px; }
        .stocks-table th:nth-child(3)  { width: 60px; }
        .stocks-table th:nth-child(4)  { width: 60px; }
        .stocks-table th:nth-child(5)  { width: 60px; }
        .stocks-table th:nth-child(6)  { width: 60px; }
        .stocks-table th:nth-child(7)  { width: 60px; }
        .stocks-table th:nth-child(8)  { width: 64px; }
        .stocks-table th:nth-child(9)  { width: 64px; }
        .stocks-table th:nth-child(10) { width: 70px; }
        .stocks-table th:nth-child(11) { width: 52px; }
        .stocks-table th:nth-child(12) { width: 48px; }

        .stocks-table thead { position: sticky; top: 0; z-index: 2; }
        .stocks-table th {
            text-align: left; padding: 8px 8px;
            background: #0d1117; border-bottom: 1px solid #21262d;
            font-size: 0.85em; font-weight: 500; letter-spacing: 0.04em;
            text-transform: uppercase; color: #8b949e; cursor: pointer;
            user-select: none; white-space: nowrap;
        }
        .stocks-table th:hover { color: #8b949e; }
        .stocks-table th.sort-desc::after { content: " ↓"; color: #388bfd; }
        .stocks-table th.sort-asc::after  { content: " ↑"; color: #388bfd; }
        .stocks-table th.sorted { color: #8b949e; }

        .stocks-table td { padding: 9px 8px; border-bottom: 1px solid #161b22; color: #8b949e; vertical-align: middle; overflow: hidden; }
        .stock-row { cursor: pointer; transition: background 0.1s; }
        .stock-row:hover { background: #161b22; }
        .stock-row.active { background: #1c2128; }

        .ticker-badge { display: inline-flex; padding: 3px 8px; border-radius: 4px; background: #161b22; color: #58a6ff; font-size: 0.95em; font-weight: 600; border: 1px solid #21262d; }
        .up   { color: #3fb950 !important; font-weight: 500; }
        .down { color: #f85149 !important; font-weight: 500; }

        .val-bar { position: relative; display: inline-block; padding: 2px 4px; border-radius: 3px; min-width: 48px; text-align: right; }
        .val-bar-fill { position: absolute; top: 0; height: 100%; border-radius: 3px; opacity: 0.13; z-index: 0; }
        .val-bar-fill.pos { background: #2ea043; left: 0; }
        .val-bar-fill.neg { background: #da3633; right: 0; }
        .val-bar-text { position: relative; z-index: 1; }

        /* Dist/MA dropdown */
        .dist-ma-btn {
            display: inline-block; cursor: pointer; padding: 1px 5px; border-radius: 3px;
            color: #484f58; font-size: 0.85em; background: #161b22; margin-left: 2px; letter-spacing: 1px;
        }
        .dist-ma-btn:hover { color: #c8d0dc; }
        .dist-ma-dropdown {
            display: none; position: fixed; background: #161b22; border: 1px solid #30363d;
            border-radius: 7px; padding: 10px 12px; z-index: 10000; min-width: 180px;
            font-size: 0.82em; color: #c8d0dc;
        }
        .dist-ma-dropdown.open { display: block; }
        .dma-row { margin-bottom: 8px; }
        .dma-row:last-child { margin-bottom: 0; }
        .dma-row label { display: block; color: #484f58; font-size: 0.78em; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
        .dma-btns { display: flex; gap: 4px; flex-wrap: wrap; }
        .dma-opt { padding: 3px 8px; border-radius: 4px; border: 1px solid #30363d; background: #0d1117; color: #8b949e; cursor: pointer; font-size: 0.9em; font-family: inherit; }
        .dma-opt:hover { background: #161b22; color: #c8d0dc; }
        .dma-opt.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        /* Column tooltip */
        #col-tooltip {
            position: fixed; background: #161b22; color: #8b949e;
            padding: 5px 9px; border-radius: 5px; font-size: 0.74em;
            width: 180px; line-height: 1.4; border: 1px solid #30363d;
            pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 9999;
        }
        #col-tooltip.visible { opacity: 1; }

        /* Chart modal */
        .chart-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 9990; display: none; align-items: center; justify-content: center;
        }
        .chart-modal-overlay.open { display: flex; }
        .chart-modal {
            width: 92vw; height: 90vh; background: #0d1117;
            border-radius: 8px; border: 1px solid #30363d;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chart-modal-header {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 14px; background: #161b22;
            border-bottom: 1px solid #21262d; flex-shrink: 0;
        }
        .chart-modal-sym { font-size: 0.9em; font-weight: 700; color: #58a6ff; }
        .chart-modal-hint { font-size: 0.72em; color: #484f58; margin-left: auto; }
        .chart-modal-close { background: transparent; border: none; color: #484f58; cursor: pointer; font-size: 1.2rem; padding: 0 4px; }
        .chart-modal-close:hover { color: #c8d0dc; }
        .chart-modal-body { flex: 1; min-height: 0; }

        .loading-msg { padding: 40px; text-align: center; color: #484f58; font-size: 0.85em; }
    </style>
</head>
<body>

<!-- Top nav -->
<div class="topnav">
    <div class="nav-tabs">
        <div class="nav-tab active" id="tab-industries" onclick="showView('industries')">Industries</div>
        <div class="nav-tab" id="tab-stocks" onclick="showView('stocks-all')">Stocks</div>
    </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <input type="text" class="search-input" id="search-input" placeholder="Search…" autocomplete="off" spellcheck="false">
    <span class="result-count" id="result-count"></span>
    <div class="sort-group" id="sort-group">
        <button class="sort-btn active" data-sort="rank" onclick="setSort('rank')">Rank</button>
        <button class="sort-btn" data-sort="name" onclick="setSort('name')">A–Z</button>
        <button class="sort-btn" data-sort="sector" onclick="setSort('sector')">Sector</button>
    </div>
    <div class="toolbar-right">
        <span style="font-size:0.72em;color:#484f58;white-space:nowrap;" id="built-at"></span>
    </div>
</div>

<!-- Main scrollable area -->
<div class="main" id="main-area">
    <div id="loading-msg" class="loading-msg">Loading data…</div>

    <!-- Industries view -->
    <div id="view-industries" style="display:none;">
        <div class="industry-list ind-hdr-row" id="industry-list-header">
            <span class="ind-hdr-rank"></span>
            <span class="ind-hdr-name"></span>
            <span class="ind-hdr-sector"></span>
            <span class="ind-hdr-count"></span>
            <span class="ind-col-hdr sortable-ind" data-col="avg_daily"  onclick="setIndSort('avg_daily')">Day</span>
            <span class="ind-col-hdr sortable-ind" data-col="avg_1w"     onclick="setIndSort('avg_1w')">1W</span>
            <span class="ind-col-hdr sortable-ind" data-col="avg_1m"     onclick="setIndSort('avg_1m')">1M</span>
            <span class="ind-col-hdr sortable-ind" data-col="avg_3m"     onclick="setIndSort('avg_3m')">3M</span>
            <span class="ind-col-hdr sortable-ind" data-col="avg_ytd"    onclick="setIndSort('avg_ytd')">YTD</span>
            <span class="ind-col-hdr sortable-ind" data-col="rs_1m"      onclick="setIndSort('rs_1m')">1M RS</span>
            <span class="ind-col-hdr sortable-ind" data-col="rs_3m"      onclick="setIndSort('rs_3m')">3M RS</span>
            <span class="ind-col-hdr sortable-ind" data-col="rs_6m"      onclick="setIndSort('rs_6m')">6M RS</span>
            <span style="width:14px;flex-shrink:0;"></span>
        </div>
        <div class="industry-list" id="industry-list"></div>
    </div>

    <!-- Stocks for a specific industry -->
    <div id="view-industry-stocks" class="stocks-view">
        <div class="stocks-header">
            <button class="back-btn" onclick="backToIndustries()">← Back</button>
            <div>
                <div class="stocks-industry-name" id="si-name"></div>
                <div class="stocks-industry-meta" id="si-meta"></div>
            </div>
            <div class="stocks-rs-badge" id="si-rs"></div>
            <button class="back-btn" id="multichart-toggle-btn" onclick="toggleMultichart()" style="margin-left:auto;">⊞ Multichart</button>
        </div>
        <!-- Table view -->
        <div id="stocks-table-view" style="display:flex;flex-direction:column;flex:1;min-height:0;">
            <div class="stocks-table-wrap">
                <table class="stocks-table" id="stocks-table">
                    <thead id="stocks-thead"></thead>
                    <tbody id="stocks-tbody"></tbody>
                </table>
            </div>
        </div>
        <!-- Multichart view -->
        <div id="stocks-multichart-view" style="display:none;flex-direction:column;flex:1;min-height:0;">
            <div class="multichart-toolbar">
                <span class="mc-label">Timeframe</span>
                <button class="mc-tf-btn" data-tf="1" onclick="setMcTf('1')">1D</button>
                <button class="mc-tf-btn" data-tf="W" onclick="setMcTf('W')">1W</button>
                <button class="mc-tf-btn active" data-tf="D" onclick="setMcTf('D')">Daily</button>
                <button class="mc-tf-btn" data-tf="M" onclick="setMcTf('M')">Monthly</button>
            </div>
            <div class="multichart-grid" id="multichart-grid"></div>
        </div>
    </div>

    <!-- All stocks view -->
    <div id="view-stocks-all" style="display:none;">
        <table class="stocks-table" id="all-stocks-table">
            <thead id="all-stocks-thead"></thead>
            <tbody id="all-stocks-tbody"></tbody>
        </table>
    </div>
</div>

<!-- Dist/MA dropdown -->
<div id="dist-ma-dropdown" class="dist-ma-dropdown">
    <div class="dma-row">
        <label>Type</label>
        <div class="dma-btns">
            <button class="dma-opt dist-ma-type-btn active" data-type="SMA" onclick="setDistMAType('SMA')">SMA</button>
            <button class="dma-opt dist-ma-type-btn" data-type="EMA" onclick="setDistMAType('EMA')">EMA</button>
        </div>
    </div>
    <div class="dma-row">
        <label>Period</label>
        <div class="dma-btns">
            <button class="dma-opt dist-ma-len-btn" data-len="5"   onclick="setDistMALength(5)">5</button>
            <button class="dma-opt dist-ma-len-btn" data-len="10"  onclick="setDistMALength(10)">10</button>
            <button class="dma-opt dist-ma-len-btn" data-len="21"  onclick="setDistMALength(21)">21</button>
            <button class="dma-opt dist-ma-len-btn active" data-len="50"  onclick="setDistMALength(50)">50</button>
            <button class="dma-opt dist-ma-len-btn" data-len="200" onclick="setDistMALength(200)">200</button>
        </div>
    </div>
</div>

<!-- Chart modal -->
<div class="chart-modal-overlay" id="chart-modal-overlay" onclick="if(event.target===this)closeChartModal()">
    <div class="chart-modal">
        <div class="chart-modal-header">
            <span class="chart-modal-sym" id="chart-modal-sym"></span>
            <span class="chart-modal-hint">ESC to close · double-click to switch</span>
            <button class="chart-modal-close" onclick="closeChartModal()">×</button>
        </div>
        <div class="chart-modal-body">
            <div id="tradingview-chart" style="height:100%;width:100%;"></div>
        </div>
    </div>
</div>

<div id="col-tooltip"></div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
(function() {
    // ── State ──────────────────────────────────────────────────────────────
    var snapshot      = null;
    var industriesData= null;
    var currentView   = 'industries';
    var activeSort    = 'rank';
    var indSort       = { col: null, dir: -1 }; // dir: -1 = desc, 1 = asc
    var searchQuery   = '';
    var chartWidget   = null;
    var currentStockSort = { by: null, dir: 1, count: 0 };
    var activeMAType   = localStorage.getItem('distMAType')   || 'SMA';
    var activeMALength = parseInt(localStorage.getItem('distMALength') || '50');
    var allStockRows   = [];
    var currentStockIndex = -1;
    var TV_MAP = { '^VIX': 'TVC:VIX', 'CL=F': 'NYMEX:CL1!', '^TNX': 'TVC:TNX' };

    // ── Helpers ───────────────────────────────────────────────────────────
    function esc(s) {
        if (s == null) return '';
        return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(v, d, sfx) {
        if (v == null) return '<span style="color:#30363d">—</span>';
        return (v >= 0 ? '+' : '') + v.toFixed(d) + (sfx || '');
    }
    function cc(v) { return v == null ? '' : v > 0 ? 'up' : v < 0 ? 'down' : ''; }

    function valBar(value, minVal, maxVal) {
        if (value == null) return '<span style="color:#30363d">—</span>';
        var range = value >= 0 ? Math.abs(maxVal || 1) : Math.abs(minVal || 1);
        var w = Math.min(100, Math.max(0, (Math.abs(value) / (range || 1)) * 100));
        var pos = value >= 0;
        return '<div class="val-bar"><div class="val-bar-fill ' + (pos?'pos':'neg') + '" style="width:' + w + '%"></div>' +
               '<span class="val-bar-text ' + cc(value) + '">' + fmt(value,2,'%') + '</span></div>';
    }

    // ── View switching ─────────────────────────────────────────────────────
    window.showView = function(view) {
        currentView = view;
        document.getElementById('view-industries').style.display      = 'none';
        document.getElementById('view-industry-stocks').classList.remove('active');
        document.getElementById('view-stocks-all').style.display      = 'none';

        document.getElementById('tab-industries').classList.toggle('active', view === 'industries');
        document.getElementById('tab-stocks').classList.toggle('active', view === 'stocks-all');

        // Show/hide toolbar elements (only for industries view)
        document.getElementById('sort-group').style.display = (view === 'industries') ? 'flex' : 'none';
        document.querySelector('.toolbar-right').style.display = (view === 'industries') ? 'flex' : 'none';
        document.getElementById('industry-list-header').style.display = (view === 'industries') ? 'flex' : 'none';

        if (view === 'industries') {
            document.getElementById('view-industries').style.display = 'block';
            renderIndustries();
        } else if (view === 'industry-stocks') {
            document.getElementById('view-industry-stocks').classList.add('active');
        } else if (view === 'stocks-all') {
            document.getElementById('view-stocks-all').style.display = 'block';
            renderAllStocks();
        }
    };

    // ── Timeframe / sort ──────────────────────────────────────────────────
    window.setIndSort = function(col) {
        if (indSort.col === col) {
            indSort.dir *= -1;
        } else {
            indSort.col = col;
            indSort.dir = -1; // default desc (best performers first)
        }
        // Update header indicators
        document.querySelectorAll('.ind-col-hdr').forEach(function(el) {
            el.classList.remove('sorted','asc','desc');
            if (el.getAttribute('data-col') === col) {
                el.classList.add('sorted', indSort.dir === 1 ? 'asc' : 'desc');
            }
        });
        renderIndustries();
    };

    window.setSort = function(s) {
        activeSort = s;
        indSort = { col: null, dir: -1 }; // reset column sort when switching preset sort
        document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-sort') === s); });
        document.querySelectorAll('.ind-col-hdr').forEach(function(el){ el.classList.remove('sorted','asc','desc'); });
        renderIndustries();
    };

    // ── Industries render ─────────────────────────────────────────────────
    function getIndSortVal(ind, summary, col) {
        if (!col) return null;
        if (col === 'avg_daily') return summary ? summary.avg_daily : null;
        if (col === 'avg_1w')    return summary ? summary.avg_1w    : null;
        if (col === 'avg_1m')    return summary ? summary.avg_1m    : null;
        if (col === 'avg_3m')    return summary ? summary.avg_3m    : null;
        if (col === 'avg_ytd')   return summary ? summary.avg_ytd   : null;
        if (col === 'rs_1m')     return ind['1m_rs_pct'] != null ? ind['1m_rs_pct'] : null;
        if (col === 'rs_3m')     return ind['3m_rs_pct'] != null ? ind['3m_rs_pct'] : null;
        if (col === 'rs_6m')     return ind['6m_rs_pct'] != null ? ind['6m_rs_pct'] : null;
        return null;
    }

    function rsColClass(v) { return v == null ? 'neutral' : v >= 50 ? 'positive' : 'negative'; }

    function perfCol(val) {
        if (val == null) return '<span class="industry-perf-num neutral">—</span>';
        var cl = val > 0 ? 'up' : val < 0 ? 'down' : 'neutral';
        return '<span class="industry-perf-num ' + cl + '">' + (val >= 0 ? '+' : '') + val.toFixed(2) + '%</span>';
    }

    function renderIndustries() {
        var list = document.getElementById('industry-list');
        if (!industriesData || !industriesData.industries) {
            list.innerHTML = '<div class="loading-msg">No industry data.</div>';
            return;
        }
        var industries = industriesData.industries.slice();
        var q = searchQuery.toLowerCase();
        if (q) industries = industries.filter(function(i){ return i.industry.toLowerCase().includes(q) || i.sector.toLowerCase().includes(q); });

        // Sort by column if active, else by preset
        if (indSort.col) {
            industries.sort(function(a, b) {
                var sumA = snapshot && snapshot.industry_summary && snapshot.industry_summary[a.industry];
                var sumB = snapshot && snapshot.industry_summary && snapshot.industry_summary[b.industry];
                var va = getIndSortVal(a, sumA, indSort.col);
                var vb = getIndSortVal(b, sumB, indSort.col);
                if (va == null && vb == null) return 0;
                if (va == null) return 1;
                if (vb == null) return -1;
                return (va - vb) * indSort.dir * -1;
            });
        } else {
            if (activeSort === 'rank')   industries.sort(function(a,b){ return (a.rank||999) - (b.rank||999); });
            else if (activeSort === 'name')   industries.sort(function(a,b){ return a.industry.localeCompare(b.industry); });
            else if (activeSort === 'sector') industries.sort(function(a,b){ return a.sector.localeCompare(b.sector) || (a.rank||999) - (b.rank||999); });
        }

        document.getElementById('result-count').textContent = industries.length + ' industries';

        var html = '';
        industries.forEach(function(ind) {
            var stockCount = (snapshot && snapshot.by_industry && snapshot.by_industry[ind.industry])
                ? snapshot.by_industry[ind.industry].length : (ind.tickers ? ind.tickers.length : 0);
            var summary = snapshot && snapshot.industry_summary && snapshot.industry_summary[ind.industry];
            var rs1m = ind['1m_rs_pct']; var rs3m = ind['3m_rs_pct']; var rs6m = ind['6m_rs_pct'];

            html += '<div class="industry-row" data-industry="' + esc(ind.industry) + '">';
            html += '<span class="industry-rank">' + (ind.rank || '—') + '</span>';
            html += '<span class="industry-name">' + esc(ind.industry) + '</span>';
            html += '<span class="industry-sector">' + esc(ind.sector) + '</span>';
            html += '<span class="industry-count">' + stockCount + '</span>';
            // Perf columns
            html += '<div class="industry-perf-cols">';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_daily : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_1w    : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_1m    : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_3m    : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_ytd   : null) + '</span>';
            html += '</div>';
            // RS columns
            html += '<div class="industry-rs-cols">';
            html += '<span class="industry-rs-col ' + rsColClass(rs1m) + '">' + (rs1m != null ? rs1m : '—') + '</span>';
            html += '<span class="industry-rs-col ' + rsColClass(rs3m) + '">' + (rs3m != null ? rs3m : '—') + '</span>';
            html += '<span class="industry-rs-col ' + rsColClass(rs6m) + '">' + (rs6m != null ? rs6m : '—') + '</span>';
            html += '</div>';
            html += '<span class="industry-arrow">›</span>';
            html += '</div>';
        });
        list.innerHTML = html || '<div class="loading-msg">No results.</div>';
    }

    // ── Open industry → stocks ────────────────────────────────────────────
    window.openIndustry = function(industryName) {
        var ind  = industriesData && industriesData.industries.find(function(i){ return i.industry === industryName; });
        var rows = snapshot && snapshot.by_industry && snapshot.by_industry[industryName];

        document.getElementById('si-name').textContent = industryName;

        // Reset multichart state
        multichartActive = false;
        mcTickers = rows ? rows.map(function(r){ return r.ticker; }) : [];
        mcWidgets = {};
        document.getElementById('stocks-table-view').style.display      = 'flex';
        document.getElementById('stocks-multichart-view').style.display = 'none';
        document.getElementById('multichart-toggle-btn').style.background  = '';
        document.getElementById('multichart-toggle-btn').style.borderColor = '';
        document.getElementById('multichart-toggle-btn').style.color       = '';
        document.getElementById('multichart-grid').innerHTML = '';

            document.getElementById('stocks-thead').innerHTML = '';
            document.getElementById('stocks-tbody').innerHTML =

    var multichartActive = false;
    var mcTimeframe      = 'D';
    var mcTickers        = [];
    var mcWidgets        = {};

    window.toggleMultichart = function() {
        multichartActive = !multichartActive;
        document.getElementById('stocks-table-view').style.display      = multichartActive ? 'none' : 'flex';
        document.getElementById('stocks-multichart-view').style.display = multichartActive ? 'flex' : 'none';
        document.getElementById('multichart-toggle-btn').style.background = multichartActive ? '#1f3a5c' : '';
        document.getElementById('multichart-toggle-btn').style.borderColor = multichartActive ? '#388bfd' : '';

    window.setMcTf = function(tf) {
        mcTimeframe = tf;
        document.querySelectorAll('.mc-tf-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-tf') === tf); });
        mcWidgets = {};
        renderMulticharts();
    };

    function renderMulticharts() {
        var grid = document.getElementById('multichart-grid');
        if (!mcTickers.length) { grid.innerHTML = '<div style="color:#484f58;padding:20px;">No stocks.</div>'; return; }
        grid.innerHTML = '';
        mcWidgets = {};
        mcTickers.forEach(function(sym) {
            var cell = document.createElement('div');
            cell.className = 'mc-cell';
            var label = document.createElement('div');
            label.className = 'mc-cell-label';
            label.textContent = sym;
            var chartDiv = document.createElement('div');
            chartDiv.id = 'mc-chart-' + sym.replace(/[^a-zA-Z0-9]/g,'_');
            chartDiv.style.cssText = 'width:100%;height:100%;';
            cell.appendChild(label);
            cell.appendChild(chartDiv);
            grid.appendChild(cell);

            // Use IntersectionObserver to init chart only when visible
            var observer = new IntersectionObserver(function(entries) {
                if (!entries[0].isIntersecting) return;
                observer.disconnect();
                var mappedSym = TV_MAP[sym] || sym;
                try {
                    mcWidgets[sym] = new TradingView.widget({
                        symbol: mappedSym, interval: mcTimeframe, locale: 'en', style: '1',
                        theme: 'dark', timezone: 'America/Toronto',
                        toolbar_bg: '#161b22', backgroundColor: '#0d1117',
                        gridColor: 'rgba(255,255,255,0.04)',
                        hide_side_toolbar: true, hide_top_toolbar: true,
                        hide_legend: true, hide_volume: false,
                        withdateranges: false, allow_symbol_change: false,
                        save_image: false, enable_publishing: false,
                        studies: ['STD;MA%Ribbon', 'Volume@tv-basicstudies'],
                        autosize: true, container_id: chartDiv.id,
                    });
                } catch(e) {}
            }, { threshold: 0.1 });
            observer.observe(cell);
        });
    }

    window.backToIndustries = function() {
        multichartActive = false;
        mcTickers = [];
        mcWidgets = {};
        document.getElementById('stocks-table-view').style.display      = 'flex';
        document.getElementById('stocks-multichart-view').style.display = 'none';
        document.getElementById('multichart-toggle-btn').style.background  = '';
        document.getElementById('multichart-toggle-btn').style.borderColor = '';
        document.getElementById('multichart-toggle-btn').style.color       = '';
        showView('industries');
    };

    // ── Render stocks table ───────────────────────────────────────────────
    function buildTableHeader(theadId, industryName) {
        var dmaTooltip = '% distance from ' + activeMAType + activeMALength;
        var cols = [
            { key:'symbol',     label:'Ticker',   tip:'Ticker symbol' },
            { key:'rs',         label:'RS',        tip:'RS Percentile (1–99)' },
            { key:'daily',      label:'Day',       tip:'Daily return' },
            { key:'1w',         label:'1W',        tip:'5-day return' },
            { key:'1m',         label:'1M',        tip:'21-day return' },
            { key:'3m',         label:'3M',        tip:'63-day return' },
            { key:'ytd',        label:'YTD',       tip:'Year-to-date return' },
            { key:'vs_spy',     label:'vSPY',      tip:'1M return vs SPY' },
            { key:'vs_spy_3m',  label:'v3M',       tip:'3M return vs SPY' },
            { key:'dist_ma',    label:'Dist/MA',   tip:dmaTooltip, extra:'<span class="dist-ma-btn" onclick="event.stopPropagation();toggleDistMA(this)">⋯</span>' },
            { key:'adr_pct',    label:'ADR%',      tip:'Avg Daily Range %' },
            { key:'cr',         label:'CR',        tip:'Closing range (100=high, 0=low)' },
        ];
        var html = '<tr>';
        cols.forEach(function(c) {
            var sortCl = (currentStockSort.by === c.key) ? (' sorted ' + (currentStockSort.dir === 1 ? 'sort-desc' : 'sort-asc')) : '';
            html += '<th class="sortable' + sortCl + '" data-sort-by="' + c.key + '" data-tooltip="' + esc(c.tip) + '">' + c.label + (c.extra||'') + '</th>';
        });
        html += '</tr>';
        document.getElementById(theadId).innerHTML = html;
    }

    function renderStocksTable(rows, industryName, theadId, tbodyId) {
        buildTableHeader(theadId, industryName);
        var ranges = (snapshot && snapshot.column_ranges && snapshot.column_ranges[industryName]) || {};
        var r1w  = ranges['1w']        || [-20,20];
        var r1m  = ranges['1m']        || [-30,30];
        var r3m  = ranges['3m']        || [-40,40];
        var rYtd = ranges['ytd']       || [-50,50];
        var rVs  = ranges['vs_spy']    || [-20,20];
        var rV3  = ranges['vs_spy_3m'] || [-30,30];
        var maKey = activeMAType + activeMALength;

        var html = '';
        rows.forEach(function(row, i) {
            var distAll = row.dist_ma || {};
            var distVal = distAll[maKey];
            var rsVal   = row.Percentile != null ? Math.round(row.Percentile) : '—';
            var crVal   = row.cr  != null ? row.cr.toFixed(0)  + '%' : '—';
            var adrVal  = row.adr_pct != null ? row.adr_pct.toFixed(2) + '%' : '—';

            html += '<tr class="stock-row"' +
                    ' data-symbol="' + esc(row.ticker) + '"' +
                    ' data-index="' + i + '"' +
                    ' data-rs="'      + (row.Percentile != null ? row.Percentile : '')  + '"' +
                    ' data-daily="'   + (row.daily      != null ? row.daily      : '')  + '"' +
                    ' data-1w="'      + (row['1w']      != null ? row['1w']      : '')  + '"' +
                    ' data-1m="'      + (row['1m']      != null ? row['1m']      : '')  + '"' +
                    ' data-3m="'      + (row['3m']      != null ? row['3m']      : '')  + '"' +
                    ' data-ytd="'     + (row.ytd        != null ? row.ytd        : '')  + '"' +
                    ' data-vs_spy="'  + (row.vs_spy     != null ? row.vs_spy     : '')  + '"' +
                    ' data-vs_spy_3m="'+(row.vs_spy_3m  != null ? row.vs_spy_3m  : '') + '"' +
                    ' data-dist_ma="' + (distVal        != null ? distVal        : '')  + '"' +
                    ' data-adr_pct="' + (row.adr_pct    != null ? row.adr_pct    : '')  + '"' +
                    ' data-cr="'      + (row.cr         != null ? row.cr         : '')  + '"' +
                    '>';
            html += '<td><span class="ticker-badge">' + esc(row.ticker) + '</span></td>';
            html += '<td style="color:#c8d0dc;font-weight:600;">' + rsVal + '</td>';
            html += '<td class="' + cc(row.daily) + '">' + (row.daily != null ? fmt(row.daily,2,'%') : '—') + '</td>';
            html += '<td>' + valBar(row['1w'],  r1w[0],  r1w[1])  + '</td>';
            html += '<td>' + valBar(row['1m'],  r1m[0],  r1m[1])  + '</td>';
            html += '<td>' + valBar(row['3m'],  r3m[0],  r3m[1])  + '</td>';
            html += '<td>' + valBar(row.ytd,    rYtd[0], rYtd[1]) + '</td>';
            html += '<td>' + valBar(row.vs_spy, rVs[0],  rVs[1])  + '</td>';
            html += '<td>' + valBar(row.vs_spy_3m, rV3[0], rV3[1])+ '</td>';
            html += '<td class="dist-ma-cell" data-dist-all="' + esc(JSON.stringify(distAll)) + '"></td>';
            html += '<td><span style="color:#8b949e">' + adrVal + '</span></td>';
            var crColor = '#484f58';
            if (row.cr != null) {
                if (row.cr >= 60) crColor = '#3fb950';
                else if (row.cr >= 30) crColor = '#e3852b';
                else crColor = '#f85149';
            }
            html += '<td><span style="color:' + crColor + ';font-weight:600;">' + crVal + '</span></td>';
            html += '</tr>';
        });
        var tbody = document.getElementById(tbodyId);
        tbody.innerHTML = html;
        applyDistMA(tbody);

        // Attach click/dblclick via delegation
        tbody.onclick = function(e) {
            var row = e.target.closest('.stock-row');
            if (!row) return;
            tbody.querySelectorAll('.stock-row.active').forEach(function(r){ r.classList.remove('active'); });
            row.classList.add('active');
            allStockRows = Array.from(tbody.querySelectorAll('.stock-row'));
            currentStockIndex = allStockRows.indexOf(row);
        };
        tbody.ondblclick = function(e) {
            var row = e.target.closest('.stock-row');
            if (!row) return;
            openChartModal(row.getAttribute('data-symbol'));
        };

        allStockRows = Array.from(tbody.querySelectorAll('.stock-row'));
        currentStockIndex = -1;
    }

    function renderAllStocks() {
        if (!snapshot || !snapshot.by_industry) return;
        var allRows = [];
        Object.keys(snapshot.by_industry).forEach(function(ind) {
            snapshot.by_industry[ind].forEach(function(r) { allRows.push(r); });
        });
        allRows.sort(function(a,b){ return (a.Rank||9999) - (b.Rank||9999); });
        buildTableHeader('all-stocks-thead', null);
        renderStocksTable(allRows, null, 'all-stocks-thead', 'all-stocks-tbody');
    }

    // ── Stock table sorting ───────────────────────────────────────────────
    document.getElementById('main-area').addEventListener('click', function(e) {
        var th = e.target.closest('th.sortable');
        if (!th || e.target.closest('.dist-ma-btn')) return;
        var sortBy = th.getAttribute('data-sort-by');
        var tbody  = th.closest('table').querySelector('tbody');
        var thead  = th.closest('thead');

        if (currentStockSort.by === sortBy) {
            currentStockSort.count++;
            if (currentStockSort.count >= 3) {
                currentStockSort = { by: null, dir: 1, count: 0 };
                var rows = Array.from(tbody.querySelectorAll('.stock-row'));
                rows.sort(function(a,b){ return parseInt(a.getAttribute('data-index')||0) - parseInt(b.getAttribute('data-index')||0); });
                tbody.innerHTML = ''; rows.forEach(function(r){ tbody.appendChild(r); });
                thead.querySelectorAll('th').forEach(function(t){ t.classList.remove('sort-asc','sort-desc','sorted'); });
                allStockRows = rows; return;
            }
        } else { currentStockSort.count = 1; }
        currentStockSort.by = sortBy;
        if (currentStockSort.count === 2) currentStockSort.dir *= -1; else currentStockSort.dir = 1;

        thead.querySelectorAll('th').forEach(function(t){ t.classList.remove('sort-asc','sort-desc','sorted'); });
        th.classList.add(currentStockSort.dir === 1 ? 'sort-desc' : 'sort-asc', 'sorted');

        var rows = Array.from(tbody.querySelectorAll('.stock-row'));
        rows.sort(function(a,b) {
            if (sortBy === 'symbol') return a.getAttribute('data-symbol').localeCompare(b.getAttribute('data-symbol')) * currentStockSort.dir;
            var av = parseFloat(a.getAttribute('data-' + sortBy));
            var bv = parseFloat(b.getAttribute('data-' + sortBy));
            if (isNaN(av)) return 1; if (isNaN(bv)) return -1;
            return (av - bv) * currentStockSort.dir;
        });
        tbody.innerHTML = ''; rows.forEach(function(r){ tbody.appendChild(r); });
        allStockRows = rows;
    });

    // ── Dist/MA ───────────────────────────────────────────────────────────
    function maKey() { return activeMAType + activeMALength; }

    function applyDistMA(container) {
        var key = maKey();
        (container || document).querySelectorAll('.dist-ma-cell').forEach(function(cell) {
            var raw = cell.getAttribute('data-dist-all');
            var val = null;
            try { val = JSON.parse(raw.replace(/&quot;/g,'"'))[key]; } catch(e) {}
            if (val == null) { cell.innerHTML = '<span style="color:#30363d">—</span>'; return; }
            var w = Math.min(100, Math.max(0, Math.abs(val) / 20 * 100));
            var pos = val >= 0;
            var cl = val > 0 ? 'up' : val < 0 ? 'down' : '';
            cell.innerHTML = '<div class="val-bar"><div class="val-bar-fill ' + (pos?'pos':'neg') + '" style="width:' + w + '%"></div>' +
                             '<span class="val-bar-text ' + cl + '">' + fmt(val,2,'%') + '</span></div>';
            var row = cell.closest('tr');
            if (row) row.setAttribute('data-dist_ma', val);
        });
    }

    window.toggleDistMA = function(btn) {
        var dd = document.getElementById('dist-ma-dropdown');
        if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
        var rect = btn.getBoundingClientRect();
        dd.style.top  = (rect.bottom + 4) + 'px';
        dd.style.left = Math.max(4, rect.right - 190) + 'px';
        dd.classList.add('open');
    };
    document.addEventListener('click', function(e) {
        var dd = document.getElementById('dist-ma-dropdown');
        if (!dd.classList.contains('open')) return;
        if (!dd.contains(e.target) && !e.target.classList.contains('dist-ma-btn')) dd.classList.remove('open');
    });
    window.setDistMAType = function(t) {
        activeMAType = t; localStorage.setItem('distMAType', t);
        document.querySelectorAll('.dist-ma-type-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-type') === t); });
        applyDistMA();
    };
    window.setDistMALength = function(l) {
        activeMALength = l; localStorage.setItem('distMALength', String(l));
        document.querySelectorAll('.dist-ma-len-btn').forEach(function(b){ b.classList.toggle('active', parseInt(b.getAttribute('data-len')) === l); });
        applyDistMA();
    };

    // ── Chart modal ───────────────────────────────────────────────────────
    function openChartModal(symbol) {
        var sym = TV_MAP[symbol] || symbol;
        document.getElementById('chart-modal-sym').textContent = symbol;
        document.getElementById('chart-modal-overlay').classList.add('open');
        if (chartWidget) {
            try { chartWidget.setSymbol(sym, null, function(){}); return; } catch(e) {}
        }
        chartWidget = new TradingView.widget({
            symbol: sym, interval: 'D', locale: 'en', style: '1',
            theme: 'dark', timezone: 'America/Toronto',
            toolbar_bg: '#161b22', backgroundColor: '#0d1117',
            gridColor: 'rgba(255,255,255,0.06)',
            hide_side_toolbar: false, hide_top_toolbar: false,
            hide_legend: false, hide_volume: true,
            details: true, hotlist: false, calendar: false,
            withdateranges: true, allow_symbol_change: true,
            studies: ['STD;MA%Ribbon', 'Volume@tv-basicstudies'],
            save_image: false, enable_publishing: false,
            autosize: true, container_id: 'tradingview-chart',
        });
    }
    window.closeChartModal = function() {
        document.getElementById('chart-modal-overlay').classList.remove('open');
    };
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeChartModal();
        if (e.target.tagName === 'INPUT') return;
        var modal = document.getElementById('chart-modal-overlay');
        if (!modal.classList.contains('open') || allStockRows.length === 0) return;
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            currentStockIndex = Math.min(currentStockIndex + 1, allStockRows.length - 1);
            var r = allStockRows[currentStockIndex];
            allStockRows.forEach(function(x){ x.classList.remove('active'); });
            r.classList.add('active');
            r.scrollIntoView({ block: 'nearest' });
            openChartModal(r.getAttribute('data-symbol'));
        }
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            currentStockIndex = Math.max(currentStockIndex - 1, 0);
            var r = allStockRows[currentStockIndex];
            allStockRows.forEach(function(x){ x.classList.remove('active'); });
            r.classList.add('active');
            r.scrollIntoView({ block: 'nearest' });
            openChartModal(r.getAttribute('data-symbol'));
        }
    });

    // ── Search ────────────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', function() {
        searchQuery = this.value;
        if (currentView === 'industries') renderIndustries();
    });

    // ── Column tooltips ───────────────────────────────────────────────────
    (function() {
        var tip = document.getElementById('col-tooltip');
        var timer;
        document.addEventListener('mouseover', function(e) {
            var el = e.target.closest('[data-tooltip]');
            if (!el) return;
            clearTimeout(timer);
            var rect = el.getBoundingClientRect();
            tip.textContent = el.getAttribute('data-tooltip');
            tip.style.left = Math.min(rect.left, window.innerWidth - 200) + 'px';
            tip.style.top  = (rect.bottom + 4) + 'px';
            tip.classList.add('visible');
        });
        document.addEventListener('mouseout', function(e) {
            if (!e.target.closest('[data-tooltip]')) return;
            timer = setTimeout(function(){ tip.classList.remove('visible'); }, 80);
        });
    })();

    // ── Load data ─────────────────────────────────────────────────────────
    Promise.all([
        fetch('data/snapshot.json').then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
        fetch('data/industries.json').then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
    ]).then(function(res) {
        snapshot       = res[0];
        industriesData = res[1];

        document.getElementById('loading-msg').style.display = 'none';

        if (industriesData && industriesData.built_at) {
            var d = new Date(industriesData.built_at);
            document.getElementById('built-at').textContent =
                'Built ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) +
                ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
        }

        // Sync DistMA buttons
        document.querySelectorAll('.dist-ma-type-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-type') === activeMAType); });
        document.querySelectorAll('.dist-ma-len-btn').forEach(function(b){ b.classList.toggle('active', parseInt(b.getAttribute('data-len')) === activeMALength); });

        showView('industries');
    });
})();
</script>
</body>
</html>
