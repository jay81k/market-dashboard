<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c8d0dc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Top nav ── */
        .topnav {
            display: flex; align-items: center; gap: 0;
            background: #0d1117; border-bottom: 1px solid #21262d;
            padding: 0 16px; height: 44px; flex-shrink: 0;
            position: relative; z-index: 50;
        }
        .nav-tabs { display: flex; gap: 2px; }
        .nav-tab {
            padding: 0 20px; height: 44px; display: flex; align-items: center;
            font-size: 1.045em; font-weight: 600; color: #6e7681; cursor: pointer;
            border-bottom: 2px solid transparent; letter-spacing: 0.02em;
            transition: color 0.15s; user-select: none;
        }
        .nav-tab:hover { color: #c8d0dc; }
        .nav-tab.active { color: #c8d0dc; border-bottom-color: #378add; }

        /* ── Toolbar ── */
        .toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: #0d1117;
            border-bottom: 1px solid #21262d; flex-shrink: 0;
            position: relative; z-index: 50;
        }
        .search-input {
            background: #161b22; border: 1px solid #21262d; border-radius: 6px;
            color: #c8d0dc; padding: 5px 12px; font-size: 0.902em; outline: none;
            font-family: inherit; width: 220px;
        }
        .search-input::placeholder { color: #484f58; }
        .search-input:focus { border-color: #388bfd44; }

        .tf-group { display: flex; gap: 3px; }
        .tf-btn {
            padding: 4px 10px; border-radius: 5px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.858em;
            font-family: inherit; cursor: pointer; font-weight: 500; letter-spacing: 0.04em;
            transition: all 0.12s;
        }
        .tf-btn:hover { background: #161b22; color: #c8d0dc; }
        .tf-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        .perf-btn {
            padding: 4px 10px; border-radius: 5px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.858em;
            font-family: inherit; cursor: pointer; font-weight: 500; letter-spacing: 0.04em;
            transition: all 0.12s;
        }
        .perf-btn:hover { background: #161b22; color: #c8d0dc; }
        .perf-btn.active { background: #1a3a5c; border-color: #2979c8; color: #58a6ff; }

        .sort-group { display: flex; gap: 3px; }
        .sort-btn {
            padding: 4px 10px; border-radius: 5px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.858em;
            font-family: inherit; cursor: pointer; font-weight: 500;
            transition: all 0.12s;
        }
        .sort-btn:hover { background: #161b22; color: #c8d0dc; }
        .sort-btn.active { background: #161b22; border-color: #30363d; color: #c8d0dc; }

        .result-count { font-size: 0.825em; color: #484f58; margin-left: 4px; }
        .toolbar-divider { width: 1px; height: 16px; background: #21262d; flex-shrink: 0; }

        /* ── Main content ── */
        .main { flex: 1; overflow-y: auto; min-height: 0; }
        #view-watchlists { height: 100%; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }

        /* ── Industries list ── */
        .industry-list { width: 100%; }
        .industry-row {
            display: flex; align-items: center; gap: 0;
            padding: 10px 16px; border-bottom: 1px solid #161b22;
            cursor: pointer; transition: background 0.1s;
        }
        .industry-row:hover { background: #161b22; }

        /* Fixed column widths — must match .ind-hdr-* exactly */
        .industry-rank   { font-size: 0.88em; color: #6e7681; width: 36px; flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; padding-right: 12px; }
        .industry-name   { font-size: 1.045em; font-weight: 500; color: #c8d0dc; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 16px; }
        .industry-sector { font-size: 0.858em; color: #8b949e; width: 160px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 12px; }
        .sector-basic-materials        { color: #c8922a; }
        .sector-technology             { color: #58a6ff; }
        .sector-energy                 { color: #e8854a; }
        .sector-financial-services     { color: #a5d6a7; }
        .sector-healthcare             { color: #f48fb1; }
        .sector-industrials            { color: #9e86c8; }
        .sector-consumer-cyclical      { color: #f9c74f; }
        .sector-consumer-defensive     { color: #80cbc4; }
        .sector-real-estate            { color: #bcaaa4; }
        .sector-utilities              { color: #90caf9; }
        .sector-communication-services { color: #ce93d8; }
        .industry-count  { font-size: 0.858em; color: #6e7681; width: 36px; flex-shrink: 0; text-align: right; font-variant-numeric: tabular-nums; padding-right: 16px; }

        /* Industries column headers */
        .ind-hdr-row {
            border-bottom: 1px solid #21262d; padding: 7px 16px;
            display: flex; align-items: center; gap: 0;
            position: sticky; top: 0; background: #0d1117; z-index: 1;
        }
        .ind-hdr-rank   { width: 36px; flex-shrink: 0; padding-right: 12px; }
        .ind-hdr-name   { flex: 1; min-width: 0; padding-right: 16px; }
        .ind-hdr-sector { width: 160px; flex-shrink: 0; padding-right: 12px; }
        .ind-hdr-count  { width: 36px; flex-shrink: 0; padding-right: 16px; }
        .ind-col-hdr {
            width: 76px; flex-shrink: 0; text-align: right;
            font-size: 0.825em; font-weight: 600; color: #6e7681;
            text-transform: uppercase; letter-spacing: 0.05em;
            cursor: pointer; user-select: none; transition: color 0.1s;
        }
        .ind-col-hdr:hover { color: #c8d0dc; }
        .ind-col-hdr.sorted { color: #388bfd; }
        .ind-col-hdr.sorted.asc::after  { content: ' ↑'; }
        .ind-col-hdr.sorted.desc::after { content: ' ↓'; }

        /* Performance & RS columns — width must match .ind-col-hdr */
        .industry-perf-cols { display: flex; align-items: center; flex-shrink: 0; }
        .industry-perf-col  { width: 76px; text-align: right; flex-shrink: 0; }
        .industry-perf-num  { font-size: 0.968em; font-weight: 600; font-variant-numeric: tabular-nums; }
        .industry-perf-num.up      { color: #3fb950; }
        .industry-perf-num.down    { color: #f85149; }
        .industry-perf-num.neutral { color: #484f58; }
        .industry-rs-cols { display: flex; align-items: center; flex-shrink: 0; }
        .industry-rs-col  { width: 76px; text-align: right; flex-shrink: 0; font-size: 0.968em; font-weight: 600; font-variant-numeric: tabular-nums; }
        .industry-rs-col.positive { color: #3fb950; }
        .industry-rs-col.negative { color: #f85149; }
        .industry-rs-col.neutral  { color: #484f58; }

        /* ── Multichart ── */
        .multichart-toolbar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 16px; background: #0d1117;
            border-bottom: 1px solid #21262d; flex-shrink: 0;
        }
        .mc-tf-btn {
            padding: 3px 9px; border-radius: 4px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.858em;
            font-family: inherit; cursor: pointer; font-weight: 500;
            transition: all 0.12s;
        }
        .mc-tf-btn:hover  { background: #161b22; color: #c8d0dc; }
        .mc-tf-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        .multichart-grid {
            flex: 1; overflow-y: auto; min-height: 0;
            display: grid; grid-template-columns: repeat(4, 1fr);
            align-content: start;
            gap: 4px; padding: 4px; background: #0d1117;
        }
        .mc-cell {
            background: #0d1117; border: 1px solid #21262d; border-radius: 4px;
            overflow: hidden; position: relative; height: 420px;
            cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s;
        }
        .mc-cell:hover { border-color: #388bfd; box-shadow: 0 0 0 1px #388bfd; }
        .mc-cell-label {
            position: absolute; top: 6px; left: 22px; z-index: 5;
            font-size: 0.858em; font-weight: 700; color: #58a6ff;
            background: rgba(13,17,23,0.75); padding: 1px 5px; border-radius: 3px;
            pointer-events: none;
        }
        .mc-cell-flag {
            position: absolute; top: 5px; left: 7px; z-index: 6;
            background: rgba(13,17,23,0.75); border: none; border-radius: 3px;
            color: #484f58; font-size: 0.92em; padding: 1px 4px;
            cursor: pointer; opacity: 0; transition: opacity 0.15s, color 0.1s;
            line-height: 1.3;
        }
        .mc-cell:hover .mc-cell-flag { opacity: 1; }
        .mc-cell-flag:hover { color: #f9c74f; }
        .mc-cell-flag.flagged { color: #f9c74f; opacity: 1; }
        .mc-cell-overlay {
            position: absolute; inset: 0; z-index: 4;
            pointer-events: all; cursor: pointer;
        }
        .mc-cell-hint {
            position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
            z-index: 5; font-size: 0.748em; color: #8b949e;
            opacity: 0; transition: opacity 0.15s; pointer-events: none;
            white-space: nowrap; background: rgba(13,17,23,0.8);
            padding: 2px 7px; border-radius: 3px;
        }
        .mc-cell:hover .mc-cell-hint { opacity: 1; }

        /* Fullscreen chart overlay */
        .mc-fullscreen-overlay {
            display: none; position: fixed; inset: 0; z-index: 99999;
            background: #0d1117; flex-direction: column;
        }
        .mc-fullscreen-overlay.open { display: flex; }
        .mc-fullscreen-header {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 14px; background: #161b22;
            border-bottom: 1px solid #21262d; flex-shrink: 0;
        }
        .mc-fullscreen-sym { font-size: 0.99em; font-weight: 700; color: #58a6ff; }
        .mc-fullscreen-close {
            background: transparent; border: none; color: #484f58;
            cursor: pointer; font-size: 1.32rem; padding: 0 4px;
        }
        .mc-fullscreen-close:hover { color: #c8d0dc; }
        .mc-fullscreen-body { flex: 1; min-height: 0; overflow: hidden; }

        /* ── Stocks view ── */
        .stocks-view { display: none; flex-direction: column; height: 100%; }
        .stocks-view.active { display: flex; }

        .stocks-header {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-bottom: 1px solid #21262d;
            background: #0d1117; flex-shrink: 0;
        }
        .back-btn {
            background: transparent; border: 1px solid #21262d; border-radius: 5px;
            color: #6e7681; font-size: 0.858em; padding: 4px 10px; cursor: pointer;
            font-family: inherit; transition: all 0.12s; display: flex; align-items: center; gap: 5px;
        }
        .back-btn:hover { background: #161b22; color: #c8d0dc; }
        .stocks-industry-name { font-size: 1.1em; font-weight: 600; color: #c8d0dc; }
        .stocks-industry-meta { font-size: 0.902em; color: #8b949e; }
        .stocks-rs-badge {
            font-size: 1.012em; font-weight: 700;
            background: #1f6feb22; color: #388bfd; border: 1px solid #1f6feb44;
            padding: 4px 12px; border-radius: 5px;
        }

        /* Stocks table */
        .stocks-table-wrap { flex: 1; overflow-y: auto; }
        .stocks-table { width: 100%; border-collapse: collapse; font-size: 0.968em; table-layout: fixed; }

        /* Stocks tab: Ticker|Price|RS|Chg|Chg%|1W|1M|3M|YTD|vSPY|v3M|Dist/MA|Avg Vol|52Wk%|ADR%|CR */
        .stocks-table th:nth-child(1)  { width: 90px; }   /* Ticker */
        .stocks-table th:nth-child(2)  { width: 68px; }   /* Price */
        .stocks-table th:nth-child(3)  { width: 40px; }   /* RS */
        .stocks-table th:nth-child(4)  { width: 62px; }   /* Chg */
        .stocks-table th:nth-child(5)  { width: 62px; }   /* Chg% */
        .stocks-table th:nth-child(6)  { width: 62px; }   /* 1W */
        .stocks-table th:nth-child(7)  { width: 62px; }   /* 1M */
        .stocks-table th:nth-child(8)  { width: 62px; }   /* 3M */
        .stocks-table th:nth-child(9)  { width: 62px; }   /* YTD */
        .stocks-table th:nth-child(10) { width: 62px; }   /* vs 1M */
        .stocks-table th:nth-child(11) { width: 62px; }   /* vs 3M */
        .stocks-table th:nth-child(12) { width: 62px; }   /* Dist/MA */
        .stocks-table th:nth-child(13) { width: 68px; }   /* Avg Vol */
        .stocks-table th:nth-child(14) { width: 58px; }   /* 52Wk% */
        .stocks-table th:nth-child(15) { width: 50px; }   /* ADR% */
        .stocks-table th:nth-child(16) { width: 40px; }   /* CR */

        /* Scans tab: Ticker+btn|Industry|Price|RS|Chg|Chg%|1W|1M|3M|YTD|vs1M|3MRS|Dist/MA|Avg Vol|52Wk%|ADR%|CR */
        #scans-table th:nth-child(1)  { width: 110px; }  /* Ticker */
        #scans-table th:nth-child(2)  { width: 140px; }  /* Industry */
        #scans-table th:nth-child(3)  { width: 64px; }   /* Price */
        #scans-table th:nth-child(4)  { width: 38px; }   /* RS */
        #scans-table th:nth-child(5)  { width: 60px; }   /* Chg */
        #scans-table th:nth-child(6)  { width: 60px; }   /* Chg% */
        #scans-table th:nth-child(7)  { width: 60px; }   /* 1W */
        #scans-table th:nth-child(8)  { width: 60px; }   /* 1M */
        #scans-table th:nth-child(9)  { width: 60px; }   /* 3M */
        #scans-table th:nth-child(10) { width: 60px; }   /* YTD */
        #scans-table th:nth-child(11) { width: 60px; }   /* vs 1M */
        #scans-table th:nth-child(12) { width: 60px; }   /* 3M RS */
        #scans-table th:nth-child(13) { width: 60px; }   /* Dist/MA */
        #scans-table th:nth-child(14) { width: 64px; }   /* Avg Vol */
        #scans-table th:nth-child(15) { width: 56px; }   /* 52Wk% */
        #scans-table th:nth-child(16) { width: 48px; }   /* ADR% */
        #scans-table th:nth-child(17) { width: 38px; }   /* CR */

        .stocks-table thead { position: sticky; top: 0; z-index: 2; }
        .stocks-table th {
            text-align: left; padding: 7px 10px;
            background: #0d1117; border-bottom: 1px solid #21262d;
            font-size: 0.902em; font-weight: 600; letter-spacing: 0.04em;
            text-transform: uppercase; color: #6e7681; cursor: pointer;
            user-select: none; white-space: nowrap;
        }
        .stocks-table th:hover { color: #c8d0dc; }
        .stocks-table th.sort-desc::after { content: " ↓"; color: #388bfd; }
        .stocks-table th.sort-asc::after  { content: " ↑"; color: #388bfd; }
        .stocks-table th.sorted { color: #c8d0dc; }

        .stocks-table td { padding: 8px 10px; border-bottom: 1px solid #161b22; color: #8b949e; vertical-align: middle; overflow: hidden; }
        .stock-row { cursor: pointer; transition: background 0.1s; }
        .stock-row:hover { background: #161b22; }
        .stock-row.active { background: #1c2128; }

        .ticker-badge { display: inline-flex; padding: 3px 8px; border-radius: 4px; background: #161b22; color: #58a6ff; font-size: 1.045em; font-weight: 600; border: 1px solid #21262d; }
        .up   { color: #3fb950 !important; font-weight: 500; }
        .down { color: #f85149 !important; font-weight: 500; }


        /* Dist/MA dropdown */
        .dist-ma-btn {
            display: inline-block; cursor: pointer; padding: 1px 5px; border-radius: 3px;
            color: #484f58; font-size: 0.935em; background: #161b22; margin-left: 2px; letter-spacing: 1px;
        }
        .dist-ma-btn:hover { color: #c8d0dc; }
        .dist-ma-dropdown {
            display: none; position: fixed; background: #161b22; border: 1px solid #30363d;
            border-radius: 7px; padding: 10px 12px; z-index: 10000; min-width: 180px;
            font-size: 0.902em; color: #c8d0dc;
        }
        .dist-ma-dropdown.open { display: block; }
        .dma-row { margin-bottom: 8px; }
        .dma-row:last-child { margin-bottom: 0; }
        .dma-row label { display: block; color: #484f58; font-size: 0.858em; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
        .dma-btns { display: flex; gap: 4px; flex-wrap: wrap; }
        .dma-opt { padding: 3px 8px; border-radius: 4px; border: 1px solid #30363d; background: #0d1117; color: #8b949e; cursor: pointer; font-size: 0.99em; font-family: inherit; }
        .dma-opt:hover { background: #161b22; color: #c8d0dc; }
        .dma-opt.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        /* Column tooltip */
        #col-tooltip {
            position: fixed; background: #161b22; color: #8b949e;
            padding: 5px 9px; border-radius: 5px; font-size: 0.814em;
            width: 180px; line-height: 1.4; border: 1px solid #30363d;
            pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 9999;
        }
        #col-tooltip.visible { opacity: 1; }

        /* Chart modal */
        .chart-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 9990; display: none; align-items: center; justify-content: center;
        }
        .chart-modal-overlay.open { display: flex; }
        .chart-modal {
            width: 92vw; height: 90vh; background: #0d1117;
            border-radius: 8px; border: 1px solid #30363d;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .chart-modal-header {
            display: flex; align-items: center; gap: 10px;
            padding: 7px 14px; background: #161b22;
            border-bottom: 1px solid #21262d; flex-shrink: 0;
        }
        .chart-modal-sym { font-size: 0.99em; font-weight: 700; color: #58a6ff; }
        .chart-modal-meta { font-size: 0.825em; color: #6e7681; margin-left: 10px; white-space: nowrap; }
        .chart-modal-meta .meta-sep { margin: 0 5px; color: #30363d; }
        .chart-modal-meta .meta-sector { color: #8b949e; }
        .chart-modal-meta .meta-industry { color: #6e7681; }
        .chart-rs-badge {
            font-size: 0.825em; font-weight: 700; margin-left: 10px;
            padding: 2px 8px; border-radius: 4px; white-space: nowrap;
        }
        .chart-rs-badge.rs-high   { background: #0d2b0d; color: #3fb950; border: 1px solid #2ea04322; }
        .chart-rs-badge.rs-mid    { background: #2b1d0a; color: #e3852b; border: 1px solid #e3852b22; }
        .chart-rs-badge.rs-low    { background: #2b0d0d; color: #f85149; border: 1px solid #f8514922; }
        .chart-modal-ext-btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 5px; border: 1px solid #30363d;
            background: #161b22; color: #8b949e; font-size: 0.792em;
            font-family: inherit; font-weight: 600; cursor: pointer;
            text-decoration: none; letter-spacing: 0.02em;
            transition: all 0.12s;
        }
        .chart-modal-ext-btn:hover { background: #21262d; border-color: #484f58; color: #c8d0dc; }
        .chart-modal-ext-btn svg { opacity: 0.7; flex-shrink: 0; }
        .chart-modal-close { background: transparent; border: none; color: #484f58; cursor: pointer; font-size: 1.32rem; padding: 0 4px; }
        .chart-modal-close:hover { color: #c8d0dc; }
        .chart-modal-body { flex: 1; min-height: 0; }

        .loading-msg { padding: 40px; text-align: center; color: #484f58; font-size: 0.935em; }

        /* ── Industry heatmap ── */
        .ind-view-btn {
            padding: 3px 9px; border-radius: 4px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.858em;
            font-family: inherit; cursor: pointer; transition: all 0.12s;
        }
        .ind-view-btn:hover { background: #161b22; color: #c8d0dc; }
        .ind-view-btn.active { background: #161b22; border-color: #30363d; color: #c8d0dc; }

        .heatmap-tf-group { display: flex; gap: 3px; }
        .heatmap-tf-btn {
            padding: 3px 9px; border-radius: 4px; border: 1px solid #21262d;
            background: transparent; color: #6e7681; font-size: 0.825em;
            font-family: inherit; cursor: pointer; font-weight: 500;
            transition: all 0.12s;
        }
        .heatmap-tf-btn:hover { background: #161b22; color: #c8d0dc; }
        .heatmap-tf-btn.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 4px; padding: 8px;
        }
        .heatmap-card {
            border-radius: 5px; padding: 12px 14px 14px;
            cursor: pointer; display: flex; flex-direction: column;
            justify-content: space-between; min-height: 90px;
            transition: filter 0.1s;
            border: 1px solid transparent;
        }
        .heatmap-card:hover { filter: brightness(1.15); border-color: rgba(255,255,255,0.2); }
        .heatmap-card-name {
            font-size: 0.902em; font-weight: 600; color: rgba(255,255,255,0.92);
            line-height: 1.35; word-break: break-word;
        }
        .heatmap-card-val {
            font-size: 1.1em; font-weight: 700; color: rgba(255,255,255,0.95);
            margin-top: 10px; font-variant-numeric: tabular-nums;
        }

        .market-index-card.up   { border-left: 3px solid #3fb950; }
        .market-index-card.down { border-left: 3px solid #f85149; }
        .market-index-card.flat { border-left: 3px solid #484f58; }

        /* Card header row */
        .mic-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
        .mic-label  { font-size: 0.825em; font-weight: 700; color: #c8d0dc; text-transform: uppercase; letter-spacing: 0.06em; }
        .mic-name   { font-size: 0.792em; color: #6e7681; }
        .mic-date   { font-size: 0.748em; color: #484f58; margin-left: auto; }

        /* Price + change row */
        .mic-price-row { display: flex; align-items: baseline; gap: 10px; margin-top: 6px; }
        .mic-price  { font-size: 1.45em; font-weight: 700; color: #c8d0dc; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1; }
        .mic-change { display: flex; align-items: baseline; gap: 6px; }
        .mic-chg-abs  { font-size: 0.902em; font-weight: 600; font-variant-numeric: tabular-nums; }
        .mic-chg-pct  { font-size: 0.858em; font-weight: 600; font-variant-numeric: tabular-nums; }
        .mic-chg-abs.up, .mic-chg-pct.up   { color: #3fb950; }
        .mic-chg-abs.down, .mic-chg-pct.down { color: #f85149; }
        .mic-chg-abs.flat, .mic-chg-pct.flat { color: #484f58; }

        /* Sparkline wrapper — positions y-axis labels alongside SVG */
        .mic-chart-wrap { position: relative; margin-top: 12px; }
        .mic-sparkline  { display: block; width: 100%; height: 130px; overflow: visible; }

        /* SVG element styles */
        .mic-grid-line      { stroke: #21262d; stroke-width: 1; }
        .mic-sparkline-path { fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
        .mic-sparkline-area { stroke: none; opacity: 0.1; }
        .mic-prev-close-line { stroke: #484f58; stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.6; }
        .mic-current-dot    { stroke-width: 2; }

        .mic-sparkline.up   .mic-sparkline-path { stroke: #3fb950; }
        .mic-sparkline.up   .mic-sparkline-area { fill: #3fb950; }
        .mic-sparkline.up   .mic-current-dot    { fill: #3fb950; stroke: #0d1117; }
        .mic-sparkline.down .mic-sparkline-path { stroke: #f85149; }
        .mic-sparkline.down .mic-sparkline-area { fill: #f85149; }
        .mic-sparkline.down .mic-current-dot    { fill: #f85149; stroke: #0d1117; }
        .mic-sparkline.flat .mic-sparkline-path { stroke: #484f58; }
        .mic-sparkline.flat .mic-sparkline-area { fill: #484f58; }
        .mic-sparkline.flat .mic-current-dot    { fill: #484f58; stroke: #0d1117; }

        /* Y-axis price badge on the right */
        .mic-price-badge {
            position: absolute; right: 0; transform: translateY(-50%);
            font-size: 0.682em; font-weight: 700; font-variant-numeric: tabular-nums;
            padding: 1px 5px; border-radius: 3px; pointer-events: none; white-space: nowrap;
        }
        .mic-price-badge.up   { background: #3fb950; color: #0d1117; }
        .mic-price-badge.down { background: #f85149; color: #0d1117; }
        .mic-price-badge.flat { background: #484f58; color: #c8d0dc; }
        .mic-price-badge.hi   { background: transparent; color: #484f58; border: 1px solid #21262d; }
        .mic-price-badge.lo   { background: transparent; color: #484f58; border: 1px solid #21262d; }

        /* X-axis time labels */
        .mic-xaxis { display: flex; justify-content: space-between; margin-top: 4px; padding: 0 2px; }
        .mic-xaxis span { font-size: 0.682em; color: #484f58; font-variant-numeric: tabular-nums; }
        /* ── Market breadth ── */
        .market-section-label {
            font-size: 0.748em; font-weight: 700; color: #484f58;
            text-transform: uppercase; letter-spacing: 0.08em;
            padding: 4px 16px 8px;
        }
        .market-breadth-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin: 0 16px 20px;
        }
        .market-ad-wrap {
            background: #161b22; border: 1px solid #21262d; border-radius: 8px;
            padding: 14px 18px;
        }
        .market-ad-row {
            display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
        }
        .market-ad-row:last-child { margin-bottom: 0; }
        .market-ad-side-adv { min-width: 110px; }
        .market-ad-side-dec { min-width: 110px; text-align: right; }
        .market-ad-label { font-size: 0.792em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .market-ad-label.adv { color: #3fb950; }
        .market-ad-label.dec { color: #f85149; }
        .market-ad-label.unch { color: #484f58; }
        .market-ad-count { font-size: 1.12em; font-weight: 700; font-variant-numeric: tabular-nums; }
        .market-ad-count.adv { color: #3fb950; }
        .market-ad-count.dec { color: #f85149; }
        .market-ad-count.unch { color: #484f58; }
        .market-ad-pct { font-size: 0.792em; color: #6e7681; font-variant-numeric: tabular-nums; }

        /* The bar */
        .market-ad-bar-wrap { flex: 1; display: flex; height: 8px; border-radius: 4px; overflow: hidden; gap: 2px; }
        .market-ad-bar-adv  { background: #3fb950; border-radius: 4px 0 0 4px; transition: width 0.4s ease; }
        .market-ad-bar-unch { background: #30363d; transition: width 0.4s ease; }
        .market-ad-bar-dec  { background: #f85149; border-radius: 0 4px 4px 0; flex: 1; transition: width 0.4s ease; }

        /* Ratio line */
        .market-ad-ratio {
            margin-top: 10px; padding-top: 10px; border-top: 1px solid #21262d;
            display: flex; gap: 20px;
        }
        .market-ad-stat { display: flex; flex-direction: column; gap: 2px; }
        .market-ad-stat-label { font-size: 0.682em; color: #484f58; text-transform: uppercase; letter-spacing: 0.05em; }
        .market-ad-stat-val   { font-size: 0.938em; font-weight: 700; font-variant-numeric: tabular-nums; color: #c8d0dc; }
        .market-ad-stat-val.up   { color: #3fb950; }
        .market-ad-stat-val.down { color: #f85149; }
        .market-ma-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px; margin: 0 16px 20px;
            align-items: start;
        }
        /* MA card internals */
        .ma-split-row { display: flex; align-items: baseline; gap: 6px; margin-top: 4px; }
        .ma-pct-big   { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
        .ma-pct-big.up   { color: #3fb950; }
        .ma-pct-big.down { color: #f85149; }
        .ma-pct-big.flat { color: #8b949e; }
        .ma-pct-sm    { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; color: #f85149; }
        .ma-pct-div   { font-size: 17px; color: #30363d; }
        .ma-counts-row { display: flex; justify-content: space-between; font-size: 11px; color: #6e7681; font-variant-numeric: tabular-nums; margin-top: 2px; }
        .ma-counts-row .up   { color: #3fb950; }
        .ma-counts-row .down { color: #f85149; }
        .ma-split-bar { height: 5px; border-radius: 3px; overflow: hidden; display: flex; margin-top: 6px; }
        .ma-split-bar-adv { height: 100%; border-radius: 3px 0 0 3px; }
        .ma-split-bar-adv.up   { background: #3fb950; }
        .ma-split-bar-adv.flat { background: #484f58; }
        .ma-split-bar-dec { height: 100%; border-radius: 0 3px 3px 0; flex: 1; background: #f85149; }
        .ma-zone-row  { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
        .ma-zone      { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .ma-zone.up   { color: #3fb950; }
        .ma-zone.down { color: #f85149; }
        .ma-zone.flat { color: #8b949e; }
        .ma-net       { font-size: 10px; color: #6e7681; font-variant-numeric: tabular-nums; }
        .ma-net.up    { color: #3fb950; }
        .ma-net.down  { color: #f85149; }
        .ma-crit-tag  { font-size: 10px; color: #484f58; margin-top: 4px; padding: 3px 7px; background: #0d1117; border-radius: 4px; border: 1px solid #21262d; align-self: flex-start; }
        .ma-crit-tag span { color: #58a6ff; font-weight: 600; }
    </style>
</head>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
(function() {
    // ── State ──────────────────────────────────────────────────────────────
    var snapshot      = null;
    var industriesData= null;
    var currentView   = 'industries';
    var activeSort    = 'rank';
    var indSort       = { col: null, dir: -1 }; // dir: -1 = desc, 1 = asc
    var searchQuery   = '';
    var chartWidget   = null;
    var currentStockSort = { by: null, dir: 1, count: 0 };
    var activeMAType   = localStorage.getItem('distMAType')   || 'SMA';
    var activeMALength = parseInt(localStorage.getItem('distMALength') || '50');
    var allStockRows   = [];
    var currentStockIndex = -1;
    var allIndustryRows = [];
    var currentIndustryIndex = -1;
    var currentWlIndex = -1;
    var TV_MAP = { '^VIX': 'TVC:VIX', 'CL=F': 'NYMEX:CL1!', '^TNX': 'TVC:TNX' };

    // ── Helpers ───────────────────────────────────────────────────────────
    function esc(s) {
        if (s == null) return '';
        return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(v, d, sfx) {
        if (v == null) return '<span style="color:#30363d">—</span>';
        return (v >= 0 ? '+' : '') + v.toFixed(d) + (sfx || '');
    }
    function cc(v) { return v == null ? '' : v > 0 ? 'up' : v < 0 ? 'down' : ''; }

    function sectorClass(sector) {
        if (!sector) return '';
        var s = sector.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        return 'sector-' + s;
    }


    // ── View switching ─────────────────────────────────────────────────────
    window.showView = function(view) {
        currentView = view;
        currentIndustryIndex = -1;
        currentStockIndex    = -1;
        currentWlIndex       = -1;
        document.getElementById('view-industries').style.display      = 'none';
        document.getElementById('view-industry-stocks').classList.remove('active');
        document.getElementById('view-scans').style.display           = 'none';
        document.getElementById('view-sector').style.display          = 'none';
        document.getElementById('view-watchlists').style.display      = 'none';
        document.getElementById('view-market').style.display          = 'none';
        if (view !== 'market') marketStopTimer();
        if (window._wlChartMsgHandler) { window.removeEventListener('message', window._wlChartMsgHandler); window._wlChartMsgHandler = null; }
        if (view !== 'watchlists') {
            wlStopPricePolling();
        }
        if (view !== 'watchlists' && wlMcActive) {
            wlMcActive = false;
            var btn = document.getElementById('wl-multichart-toggle-btn');
            if (btn) { btn.style.background = ''; btn.style.borderColor = ''; btn.style.color = ''; }
            var mcView = document.getElementById('wl-multichart-view');
            if (mcView) mcView.style.display = 'none';
            wlMcWidgets = {};
        }

        document.getElementById('main-area').style.overflow = (view === 'watchlists') ? 'hidden' : '';

        document.getElementById('tab-industries').classList.toggle('active', view === 'industries');
        document.getElementById('tab-scans').classList.toggle('active', view === 'scans');
        document.getElementById('tab-watchlists').classList.toggle('active', view === 'watchlists');
        document.getElementById('tab-market').classList.toggle('active', view === 'market');

        var searchEl = document.getElementById('search-input');
        searchEl.value = '';
        searchQuery = '';
        if (view === 'industries') {
            searchEl.placeholder = 'Search industries…';
        } else if (view === 'industry-stocks') {
            searchEl.placeholder = 'Filter stocks…';
        } else if (view === 'scans') {
            searchEl.placeholder = 'Filter stocks…';
        } else if (view === 'watchlists') {
            searchEl.placeholder = 'Search…';
        } else if (view === 'market') {
            searchEl.placeholder = 'Market overview';
        }

        // Show/hide toolbar elements
        document.getElementById('industry-list-header').style.display = (view === 'industries') ? 'flex' : 'none';
        document.getElementById('wl-multichart-toggle-btn').style.display = (view === 'watchlists') ? '' : 'none';

        if (view === 'industries') {
            document.getElementById('view-industries').style.display = 'block';
            renderIndustries();
        } else if (view === 'industry-stocks') {
            document.getElementById('view-industry-stocks').classList.add('active');
        } else if (view === 'scans') {
            document.getElementById('view-scans').style.display = 'flex';
            renderScans();
        } else if (view === 'sector') {
            document.getElementById('view-sector').style.display = 'flex';
        } else if (view === 'watchlists') {
            document.getElementById('view-watchlists').style.display = 'flex';
            wlRender();
            wlStartPricePolling();
            // Auto-load last selected ticker if available
            if (!wlMcActive) {
                var autoTicker = wlChartTicker;
                if (!autoTicker) {
                    var autoList = wlGetLastList();
                    var autoAll  = wlGetAll();
                    if (autoList && autoAll[autoList] && autoAll[autoList].length) {
                        autoTicker = autoAll[autoList][0];
                    }
                }
                if (autoTicker) wlSelectTicker(autoTicker);
            }
        } else if (view === 'market') {
            document.getElementById('view-market').style.display = 'flex';
            renderMarketBreadth();
            renderMarketHL();
            renderMarketMA();
            marketFetchAll();
        }
    };

    // ── Industry list click delegation ──────────────────────────────────
    document.getElementById('industry-list').addEventListener('click', function(e) {
        var row = e.target.closest('.industry-row');
        if (!row) return;
        var industry = row.getAttribute('data-industry');
        if (industry) openIndustry(industry);
    });

    // ── Sector drill-down ────────────────────────────────────────────────
    var currentSector = '';

    window.openSector = function(sectorName) {
        currentSector = sectorName;
        var secCl = sectorClass(sectorName);

        // Get all industries in this sector from industriesData
        var industries = (industriesData && industriesData.industries)
            ? industriesData.industries.filter(function(i){ return i.sector === sectorName; })
            : [];
        industries.sort(function(a,b){ return (a.rank||999) - (b.rank||999); });

        document.getElementById('sector-name').innerHTML =
            '<span class="' + secCl + '">' + esc(sectorName) + '</span>';
        document.getElementById('sector-meta').textContent =
            industries.length + ' industries';

        var html = '';
        industries.forEach(function(ind) {
            var summary = snapshot && snapshot.industry_summary && snapshot.industry_summary[ind.industry];
            var stockCount = (snapshot && snapshot.by_industry && snapshot.by_industry[ind.industry])
                ? snapshot.by_industry[ind.industry].length : 0;
            html += '<div class="industry-row" data-industry="' + esc(ind.industry) + '" onclick="openIndustry(\'' + esc(ind.industry) + '\')">';
            html += '<span class="industry-rank">' + (ind.rank || '—') + '</span>';
            html += '<span class="industry-name">' + esc(ind.industry) + '</span>';
            html += '<span class="industry-count">' + stockCount + '</span>';
            html += '<div class="industry-perf-cols">';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_daily : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_1w    : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_1m    : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_3m    : null) + '</span>';
            html += '<span class="industry-perf-col">' + perfCol(summary ? summary.avg_ytd   : null) + '</span>';
            html += '</div>';
            html += '</div>';
        });
        document.getElementById('sector-industry-list').innerHTML = html || '<div class="loading-msg">No industries.</div>';
        showView('sector');
    };

    window.backFromSector = function() {
        showView('industries');
    };

        // ── Timeframe / sort ──────────────────────────────────────────────────
    window.setIndSort = function(col) {
        if (indSort.col === col) {
            indSort.dir *= -1;
        } else {
            indSort.col = col;
            indSort.dir = -1; // default desc (best performers first)
        }
        // Update header indicators
        document.querySelectorAll('.ind-col-hdr').forEach(function(el) {
            el.classList.remove('sorted','asc','desc');
            if (el.getAttribute('data-col') === col) {
                el.classList.add('sorted', indSort.dir === 1 ? 'asc' : 'desc');
            }
        });
        renderIndustries();
    };

    window.setSort = function(s) {
        activeSort = s;
        indSort = { col: null, dir: -1 }; // reset column sort when switching preset sort
        document.querySelectorAll('.sort-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-sort') === s); });
        document.querySelectorAll('.ind-col-hdr').forEach(function(el){ el.classList.remove('sorted','asc','desc'); });
        renderIndustries();
    };

    // ── Industries render ─────────────────────────────────────────────────
    function getIndSortVal(ind, summary, col) {
        if (!col) return null;
        if (col === 'avg_daily') return summary ? summary.avg_daily : null;
        if (col === 'avg_1w')    return summary ? summary.avg_1w    : null;
        if (col === 'avg_1m')    return summary ? summary.avg_1m    : null;
        if (col === 'avg_3m')    return summary ? summary.avg_3m    : null;
        if (col === 'avg_ytd')   return summary ? summary.avg_ytd   : null;
        if (col === 'rs_1m')     return ind['1m_rs_pct'] != null ? ind['1m_rs_pct'] : null;
        if (col === 'rs_3m')     return ind['3m_rs_pct'] != null ? ind['3m_rs_pct'] : null;
        if (col === 'rs_6m')     return ind['6m_rs_pct'] != null ? ind['6m_rs_pct'] : null;
        return null;
    }

    function rsColClass(v) { return v == null ? 'neutral' : v >= 50 ? 'positive' : 'negative'; }

    function perfCol(val) {
        if (val == null) return '<span class="industry-perf-num neutral">—</span>';
        var cl = val > 0 ? 'up' : val < 0 ? 'down' : 'neutral';
        return '<span class="industry-perf-num ' + cl + '">' + (val >= 0 ? '+' : '') + val.toFixed(2) + '%</span>';
    }


    // ── Industry heatmap ──────────────────────────────────────────────────
    var indView    = 'list';
    var heatmapTf  = 'avg_daily';

    function heatmapColor(val) {
        if (val == null) return null;
        // Scale: 0% = neutral, ±5% = full saturation (clamp beyond)
        var maxVal = 5.0;
        var t = Math.min(1, Math.abs(val) / maxVal);
        if (val > 0) {
            // green: from #1a3a2a (near 0) to #1a7a3a (full)
            var g = Math.round(60 + t * 100);
            var r = Math.round(10 + t * 5);
            var b = Math.round(20 + t * 10);
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        } else {
            // red: from #3a1a1a (near 0) to #8a1a1a (full)
            var r2 = Math.round(60 + t * 100);
            var g2 = Math.round(10 + t * 5);
            var b2 = Math.round(10 + t * 5);
            return 'rgb(' + r2 + ',' + g2 + ',' + b2 + ')';
        }
    }

    function heatmapValLabel(tf) {
        var map = { avg_daily:'Day', avg_1w:'1W', avg_1m:'1M', avg_3m:'3M', avg_ytd:'YTD' };
        return map[tf] || tf;
    }

    function renderHeatmap() {
        var container = document.getElementById('industry-heatmap');
        if (!industriesData || !industriesData.industries) {
            container.innerHTML = '<div class="loading-msg">No industry data.</div>';
            return;
        }
        var industries = industriesData.industries.slice();
        var q = searchQuery.toLowerCase();
        if (q) industries = industries.filter(function(i){ return i.industry.toLowerCase().includes(q) || i.sector.toLowerCase().includes(q); });

        // Sort by selected timeframe descending
        industries.sort(function(a, b) {
            var sumA = snapshot && snapshot.industry_summary && snapshot.industry_summary[a.industry];
            var sumB = snapshot && snapshot.industry_summary && snapshot.industry_summary[b.industry];
            var va = sumA ? sumA[heatmapTf] : null;
            var vb = sumB ? sumB[heatmapTf] : null;
            if (va == null && vb == null) return 0;
            if (va == null) return 1;
            if (vb == null) return -1;
            return vb - va;
        });

        document.getElementById('heatmap-result-count').textContent = industries.length + ' industries';

        var html = '<div class="heatmap-grid">';
        industries.forEach(function(ind) {
            var summary = snapshot && snapshot.industry_summary && snapshot.industry_summary[ind.industry];
            var val = summary ? summary[heatmapTf] : null;
            var bg  = heatmapColor(val);
            var valStr = val != null ? (val >= 0 ? '+' : '') + val.toFixed(2) + '%' : '—';
            var isNull = bg == null;
            html += '<div class="heatmap-card' + (isNull ? ' heatmap-card-null' : '') + '"' +
                    ' style="background:' + (bg || '#161b22') + ';"' +
                    ' data-industry="' + esc(ind.industry) + '"' +
                    ' onclick="openIndustry(\'' + esc(ind.industry) + '\')">' +
                    '<div class="heatmap-card-name">' + esc(ind.industry) + '</div>' +
                    '<div class="heatmap-card-val">' + valStr + '</div>' +
                    '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
    }

    window.setIndView = function(view) {
        indView = view;
        var isList = view === 'list';

        document.getElementById('industry-list-header').style.display = isList ? 'flex' : 'none';
        document.getElementById('heatmap-toolbar').style.display      = isList ? 'none' : 'flex';
        document.getElementById('industry-list').style.display        = isList ? 'block' : 'none';
        document.getElementById('industry-heatmap').style.display     = isList ? 'none' : 'block';

        // Sync toggle buttons
        ['ind-view-list-btn','ind-view-list-btn2'].forEach(function(id) {
            var el = document.getElementById(id); if (el) el.classList.toggle('active', isList);
        });
        ['ind-view-heat-btn','ind-view-heat-btn2'].forEach(function(id) {
            var el = document.getElementById(id); if (el) el.classList.toggle('active', !isList);
        });

        if (!isList) renderHeatmap();
        else renderIndustries();
    };

    window.setHeatmapTf = function(tf) {
        heatmapTf = tf;
        document.querySelectorAll('.heatmap-tf-btn').forEach(function(b) {
            b.classList.toggle('active', b.getAttribute('data-htf') === tf);
        });
        renderHeatmap();
    };

    function renderIndustries() {
        var list = document.getElementById('industry-list');
        if (!industriesData || !industriesData.industries) {
            list.innerHTML = '<div class="loading-msg">No industry data.</div>';
            return;
        }
        var industries = industriesData.industries.slice();
        var q = searchQuery.toLowerCase();
        if (q) industries = industries.filter(function(i){ return i.industry.toLowerCase().includes(q) || i.sector.toLowerCase().includes(q); });

        // Sort by column if active, else by preset
        if (indSort.col) {
            industries.sort(function(a, b) {
                var sumA = snapshot && snapshot.industry_summary && snapshot.industry_summary[a.industry];
                var sumB = snapshot && snapshot.industry_summary && snapshot.industry_summary[b.industry];
                var va = getIndSortVal(a, sumA, indSort.col);
                var vb = getIndSortVal(b, sumB, indSort.col);
                if (va == null && vb == null) return 0;
                if (va == null) return 1;
                if (vb == null) return -1;
                return (va - vb) * indSort.dir * -1;
            });
        } else {
            if (activeSort === 'rank')   industries.sort(function(a,b){ return (a.rank||999) - (b.rank||999); });
            else if (activeSort === 'name')   industries.sort(function(a,b){ return a.industry.localeCompare(b.industry); });
            else if (activeSort === 'sector') industries.sort(function(a,b){ return a.sector.localeCompare(b.sector) || (a.rank||999) - (b.rank||999); });
        }

        var rcEl = document.getElementById('result-count'); if (rcEl) rcEl.textContent = industries.length + ' industries';

        var html = '';
        industries.forEach(function(ind) {
            var stockCount = (snapshot && snapshot.by_industry && snapshot.by_industry[ind.industry])
                ? snapshot.by_industry[ind.industry].length : (ind.tickers ? ind.tickers.length : 0);
            var summary = snapshot && snapshot.industry_summary && snapshot.industry_summary[ind.industry];
            var rs1m = ind['1m_rs_pct']; var rs3m = ind['3m_rs_pct']; var rs6m = ind['6m_rs_pct'];

            html += '<div class="industry-row" data-industry="' + esc(ind.industry) + '">';
            html += '<span class="industry-rank">' + (ind.rank || '—') + '</span>';

    function renderMulticharts() {
        var grid = document.getElementById('multichart-grid');
        if (!mcTickers.length) { grid.innerHTML = '<div style="color:#484f58;padding:20px;">No stocks.</div>'; return; }
        grid.innerHTML = '';
        mcWidgets = {};
        mcTickers.forEach(function(sym) {
            var cell = document.createElement('div');
            cell.className = 'mc-cell';
            cell.setAttribute('data-sym', sym);

            var label = document.createElement('div');
            label.className = 'mc-cell-label';
            label.textContent = sym;

            var flag = document.createElement('button');
            flag.className = 'mc-cell-flag' + (wlIsFlagged(sym) ? ' flagged' : '');
            flag.textContent = '⚑';
            flag.title = 'Add to Flagged';
            flag.addEventListener('click', function(e) {
                e.stopPropagation();
                wlFlagTicker(sym, flag);
            });

            var hint = document.createElement('div');
            hint.className = 'mc-cell-hint';
            hint.textContent = 'click to expand';

            var chartDiv = document.createElement('div');
            chartDiv.id = 'mc-chart-' + sym.replace(/[^a-zA-Z0-9]/g,'_');
            chartDiv.style.cssText = 'width:100%;height:100%;';

            var overlay = document.createElement('div');
            overlay.className = 'mc-cell-overlay';
            overlay.addEventListener('click', function(e) {
                e.stopPropagation();
                openMcFullscreen(sym);
            });

            cell.appendChild(flag);
            cell.appendChild(label);
            cell.appendChild(hint);
            cell.appendChild(overlay);
            cell.appendChild(chartDiv);
            grid.appendChild(cell);

            var observer = new IntersectionObserver(function(entries) {
                if (!entries[0].isIntersecting) return;
                observer.disconnect();
                var mappedSym = TV_MAP[sym] || sym;
                try {
                    mcWidgets[sym] = new TradingView.widget({
                        symbol: mappedSym, interval: mcTimeframe, locale: 'en', style: '1',
                        theme: 'dark', timezone: 'America/Toronto',
                        toolbar_bg: '#161b22', backgroundColor: '#0d1117',
                        gridColor: 'rgba(255,255,255,0.04)',
                        hide_side_toolbar: true, hide_top_toolbar: true,
                        hide_legend: true, hide_volume: true,
                        withdateranges: false, allow_symbol_change: false,
                        save_image: false, enable_publishing: false,
                        studies: ['STD;MA%Ribbon', 'Volume@tv-basicstudies'],
                        right_bar_margin: 3,
                        autosize: true, container_id: chartDiv.id,
                    });
                } catch(e) {}
            }, { threshold: 0.1 });
            observer.observe(cell);
        });
    }

        var cols = [
            { key:'symbol',     label:'Ticker',   tip:'Ticker symbol' },
            { key:'price',      label:'Price',     tip:'Last closing price' },
            { key:'rs',         label:'RS',        tip:'RS Percentile (1–99)' },
            { key:'chg',        label:'Chg',       tip:'Daily change ($)' },
            { key:'daily',      label:'Chg%',      tip:'Daily return %' },
            { key:'1w',         label:'1W',        tip:'5-day return' },
            { key:'1m',         label:'1M',        tip:'21-day return' },
            { key:'3m',         label:'3M',        tip:'63-day return' },
            { key:'ytd',        label:'YTD',       tip:'Year-to-date return' },
            { key:'vs_spy',     label:'vs 1M',     tip:'1M return vs SPY' },
            { key:'vs_spy_3m',  label:'vs 3M',     tip:'3M return vs SPY' },

    function renderStocksTable(rows, industryName, theadId, tbodyId) {
        buildTableHeader(theadId, industryName);

            var distAll = row.dist_ma || {};

            var rsVal   = row.Percentile != null ? Math.round(row.Percentile) : '—';
            var crVal   = row.cr  != null ? row.cr.toFixed(0)  + '%' : '—';
            var adrVal  = row.adr_pct != null ? row.adr_pct.toFixed(2) + '%' : '—';

            html += '<tr class="stock-row"' +
                    ' data-symbol="' + esc(row.ticker) + '"' +
                    ' data-index="' + i + '"' +
                    ' data-rs="'      + (row.Percentile != null ? row.Percentile : '')  + '"' +
                    ' data-price="'   + (row.price      != null ? row.price      : '')  + '"' +
                    ' data-daily="'   + (row.daily      != null ? row.daily      : '')  + '"' +
                    ' data-chg="'     + (row.price != null && row.daily != null ? ((row.price/(1+row.daily/100))*(row.daily/100)).toFixed(4) : '') + '"' +
                    ' data-1w="'      + (row['1w']      != null ? row['1w']      : '')  + '"' +
                    ' data-1m="'      + (row['1m']      != null ? row['1m']      : '')  + '"' +
                    ' data-3m="'      + (row['3m']      != null ? row['3m']      : '')  + '"' +
                    ' data-ytd="'     + (row.ytd        != null ? row.ytd        : '')  + '"' +
                    ' data-vs_spy="'  + (row.vs_spy     != null ? row.vs_spy     : '')  + '"' +
                    ' data-vs_spy_3m="'+(row.vs_spy_3m  != null ? row.vs_spy_3m  : '') + '"' +
                    ' data-dist_ma="' + (distVal        != null ? distVal        : '')  + '"' +
                    ' data-avg_vol="' + (row.AvgVol50   != null ? row.AvgVol50   : '')  + '"' +
                    ' data-adr_pct="' + (row.adr_pct    != null ? row.adr_pct    : '')  + '"' +
                    ' data-cr="'      + (row.cr         != null ? row.cr         : '')  + '"' +
                    ' data-sector="'  + esc(row.sector   || '') + '"' +
                    ' data-industry="'+ esc(row.industry || '') + '"' +
                    '>';
            html += '<td style="white-space:nowrap;"><button class="wl-add-btn" data-ticker="' + esc(row.ticker) + '" onclick="event.stopPropagation();wlQuickToggle(this)" title="Add to watchlist">☆</button><button class="wl-pick-btn" data-ticker="' + esc(row.ticker) + '" onclick="event.stopPropagation();wlOpenPicker(this,event)" title="Choose watchlist">▾</button><span class="ticker-badge">' + esc(row.ticker) + '</span></td>';
            // Price
            var priceVal = row.price != null ? '$' + row.price.toFixed(2) : '—';
            html += '<td style="color:#c8d0dc;font-weight:500;">' + priceVal + '</td>';
            html += '<td style="color:#c8d0dc;font-weight:600;">' + rsVal + '</td>';
            // Chg ($) and Chg%
            var chgAbs = (row.price != null && row.daily != null) ? (row.price / (1 + row.daily / 100)) * (row.daily / 100) : null;
            var chgStr = chgAbs != null ? (chgAbs >= 0 ? '+' : '') + chgAbs.toFixed(2) : '—';
            html += '<td class="' + cc(row.daily) + '">' + chgStr + '</td>';
            html += '<td class="' + cc(row.daily) + '">' + (row.daily != null ? fmt(row.daily,2,'%') : '—') + '</td>';
            html += '<td class="' + cc(row['1w'])      + '">' + (row['1w']      != null ? fmt(row['1w'],2,'%')      : '—') + '</td>';
            html += '<td class="' + cc(row['1m'])      + '">' + (row['1m']      != null ? fmt(row['1m'],2,'%')      : '—') + '</td>';
            html += '<td class="' + cc(row['3m'])      + '">' + (row['3m']      != null ? fmt(row['3m'],2,'%')      : '—') + '</td>';
            html += '<td class="' + cc(row.ytd)        + '">' + (row.ytd        != null ? fmt(row.ytd,2,'%')        : '—') + '</td>';
            html += '<td class="' + cc(row.vs_spy)     + '">' + (row.vs_spy     != null ? fmt(row.vs_spy,2,'%')     : '—') + '</td>';
            html += '<td class="' + cc(row.vs_spy_3m)  + '">' + (row.vs_spy_3m  != null ? fmt(row.vs_spy_3m,2,'%')  : '—') + '</td>';
            html += '<td class="dist-ma-cell" data-dist-all="' + esc(JSON.stringify(distAll)) + '"></td>';
            // Avg Vol (from CSV AvgVol50)
            var volVal = '—';
            if (row.AvgVol50 != null) {
                var v = row.AvgVol50;
                volVal = v >= 1e6 ? (v/1e6).toFixed(1) + 'M' : v >= 1e3 ? (v/1e3).toFixed(0) + 'K' : v.toFixed(0);
            }
            html += '<td style="color:#8b949e;">' + volVal + '</td>';
            var pct52Val = '—';
            var pct52Color = '#484f58';
            if (row.PctFrom52WkHigh != null) {
                pct52Val = (row.PctFrom52WkHigh > 0 ? '+' : '') + row.PctFrom52WkHigh.toFixed(1) + '%';

                if (row.cr >= 60) crColor = '#3fb950';

                else crColor = '#f85149';
            }
            html += '<td><span style="color:' + crColor + ';font-weight:600;">' + crVal + '</span></td>';
            html += '</tr>';
        });
        var tbody = document.getElementById(tbodyId);
        tbody.innerHTML = html;

        // Attach click/dblclick via delegation

    // ── Industry-drill stocks table sorting ─────────────────────────────────
    document.getElementById('main-area').addEventListener('click', function(e) {
        var th = e.target.closest('th.sortable');
        if (!th || e.target.closest('.dist-ma-btn')) return;
        var thead = th.closest('thead');
        var table = th.closest('table');

        // Only handle industry-drill stocks table here; scans has its own handler
        if (!table || table.id === 'scans-table') return;

        var sortBy = th.getAttribute('data-sort-by');
        var tbody  = document.getElementById('stocks-tbody');
        if (!tbody) return;
        if (currentStockSort.by === sortBy) {
            currentStockSort.count++;
            if (currentStockSort.count >= 3) {
                currentStockSort = { by: null, dir: 1, count: 0 };
                var rows = Array.from(tbody.querySelectorAll('.stock-row'));
                rows.sort(function(a,b){ return parseInt(a.getAttribute('data-index')||0) - parseInt(b.getAttribute('data-index')||0); });
                tbody.innerHTML = ''; rows.forEach(function(r){ tbody.appendChild(r); });
                applyDistMA(tbody);
                thead.querySelectorAll('th').forEach(function(t){ t.classList.remove('sort-asc','sort-desc','sorted'); });
                allStockRows = rows; return;
            }
        } else { currentStockSort.count = 1; }
        currentStockSort.by = sortBy;
        if (currentStockSort.count === 2) currentStockSort.dir *= -1; else currentStockSort.dir = 1;
        thead.querySelectorAll('th').forEach(function(t){ t.classList.remove('sort-asc','sort-desc','sorted'); });
        th.classList.add(currentStockSort.dir === 1 ? 'sort-desc' : 'sort-asc', 'sorted');
        var rows = Array.from(tbody.querySelectorAll('.stock-row'));
        rows.sort(function(a,b) {
            if (sortBy === 'symbol') return a.getAttribute('data-symbol').localeCompare(b.getAttribute('data-symbol')) * currentStockSort.dir;
            var av = parseFloat(a.getAttribute('data-' + sortBy));
            var bv = parseFloat(b.getAttribute('data-' + sortBy));
            if (isNaN(av)) return 1; if (isNaN(bv)) return -1;
            return (av - bv) * currentStockSort.dir;
        });
        tbody.innerHTML = ''; rows.forEach(function(r){ tbody.appendChild(r); });
        applyDistMA(tbody);
        allStockRows = rows;
    });

        // ── Dist/MA ───────────────────────────────────────────────────────────
    function maKey() { return activeMAType + activeMALength; }

    function applyDistMA(container) {
        var key = maKey();
        var cells = (container || document).querySelectorAll('.dist-ma-cell');
        cells.forEach(function(cell) {
            var raw = cell.getAttribute('data-dist-all');
            if (!raw || raw.length < 3) { cell.innerHTML = '<span style="color:#30363d">—</span>'; return; }
            var obj = null;
            try { obj = JSON.parse(raw); } catch(e) {
                try { obj = JSON.parse(raw.replace(/&quot;/g, '"')); } catch(e2) {}
            }
            var val = obj ? obj[key] : null;
            if (val == null) { cell.innerHTML = '<span style="color:#30363d">—</span>'; return; }
            var cl = val > 0 ? 'up' : val < 0 ? 'down' : '';
            cell.innerHTML = '<span class="' + cl + '">' + fmt(val,2,'%') + '</span>';
            var row = cell.closest('tr');
            if (row) row.setAttribute('data-dist_ma', val);
        });
    }

    window.toggleDistMA = function(btn) {

        if (dd.classList.contains('open')) { dd.classList.remove('open'); return; }
        var rect = btn.getBoundingClientRect();
        dd.style.top  = (rect.bottom + 4) + 'px';
        dd.style.left = Math.max(4, rect.right - 190) + 'px';
        dd.classList.add('open');
    };
    document.addEventListener('click', function(e) {
        var dd = document.getElementById('dist-ma-dropdown');
        if (!dd.classList.contains('open')) return;
        if (!dd.contains(e.target) && !e.target.classList.contains('dist-ma-btn')) dd.classList.remove('open');

    function rsBadge(percentile) {
        if (percentile == null) return null;
        var pct = Math.round(percentile);
        var cls = pct >= 75 ? 'rs-high' : pct >= 40 ? 'rs-mid' : 'rs-low';
        return { text: 'RS ' + pct, cls: cls };
    }

    function applyRsBadge(el, percentile) {
        if (!el) return;
        var b = rsBadge(percentile);
        if (!b) { el.style.display = 'none'; return; }
        el.textContent = b.text;
        el.className = 'chart-rs-badge ' + b.cls;
        el.style.display = '';
    }

    function updateChartModalHeader(symbol) {
        var sector = '', industry = '', percentile = null;
        // Look up from snapshot
        if (snapshot && snapshot.by_industry) {
            outer: for (var ind in snapshot.by_industry) {
                var rows = snapshot.by_industry[ind];
                for (var i = 0; i < rows.length; i++) {
                    if (rows[i].ticker === symbol) {
                        sector     = rows[i].sector     || '';
                        industry   = rows[i].industry   || '';
                        percentile = rows[i].Percentile != null ? rows[i].Percentile : null;
                        break outer;
                    }
                }
            }
        }
        document.getElementById('chart-modal-sym').textContent = symbol;
        var metaEl = document.getElementById('chart-modal-meta');
        if (metaEl) {
            var indRankHtml = '';
            if (industry && industriesData && industriesData.industries) {
                var indData = industriesData.industries.find(function(x){ return x.industry === industry; });
                var total   = industriesData.industries.length;
                if (indData && indData.rank != null) {
                    var pct = indData.percentile != null ? indData.percentile : null;
                    var rankColor = pct != null ? (pct >= 75 ? '#3fb950' : pct >= 40 ? '#e3852b' : '#f85149') : '#6e7681';
                    indRankHtml = '<span class="meta-sep">·</span>' +
                        '<span class="meta-ind-rank" style="color:' + rankColor + '">' +
                        '(' + indData.rank + '/' + total + ')' +
                        '</span>';
                }
            }
            metaEl.innerHTML = industry
                ? '<span class="meta-sector">' + esc(industry) + '</span>' + indRankHtml
                : '';
        }
        applyRsBadge(document.getElementById('chart-modal-rs-badge'), percentile);
        var ticker = symbol.replace(/[^A-Z0-9]/gi, '');
        var fBtn = document.getElementById('chart-modal-fundamentals-btn');
        var nBtn = document.getElementById('chart-modal-news-btn');
        if (fBtn) fBtn.href = 'https://finviz.com/quote.ashx?t=' + ticker;
        if (nBtn) nBtn.href = 'https://finviz.com/quote.ashx?t=' + ticker + '#news';
    }

    function openChartModal(symbol, sector, industry) {
        var sym = TV_MAP[symbol] || symbol;

        // Resolve sector/industry from args, row attrs, or snapshot for initial header
        if (!sector || !industry) {
            var clickedRow = document.querySelector('.stock-row[data-symbol="' + symbol + '"]');
            if (clickedRow) {
                sector   = sector   || clickedRow.getAttribute('data-sector')   || '';
                industry = industry || clickedRow.getAttribute('data-industry') || '';
            }
        }
        // Use updateChartModalHeader for snapshot lookup + DOM update
        updateChartModalHeader(symbol);

        document.getElementById('chart-modal-overlay').classList.add('open');
        if (chartWidget) {
            try {
                chartWidget.setSymbol(sym, null, function(){});
                startChartModalPoll(symbol);
                return;
            } catch(e) {}
        }
        chartWidget = new TradingView.widget({
            symbol: sym, interval: 'D', locale: 'en', style: '1',
            theme: 'dark', timezone: 'America/Toronto',
            toolbar_bg: '#161b22', backgroundColor: '#0d1117',
            gridColor: 'rgba(255,255,255,0.06)',
            hide_side_toolbar: false, hide_top_toolbar: false,
            hide_legend: false, hide_volume: true,
            details: true, hotlist: false, calendar: false,
            withdateranges: true, allow_symbol_change: true,
            studies: ['STD;MA%Ribbon', 'Volume@tv-basicstudies'],
            save_image: false, enable_publishing: false,
            autosize: true, container_id: 'tradingview-chart',
        });
        startChartModalPoll(symbol);
    }

    var _chartModalPoll = null;
    var _chartModalObserver = null;
    var _chartModalMsgHandler = null;

    function startChartModalPoll(initialSym) {
        if (_chartModalPoll) { clearInterval(_chartModalPoll); _chartModalPoll = null; }
        if (_chartModalObserver) { _chartModalObserver.disconnect(); _chartModalObserver = null; }
        if (_chartModalMsgHandler) { window.removeEventListener('message', _chartModalMsgHandler); _chartModalMsgHandler = null; }

        var _lastSym = initialSym;

        _chartModalMsgHandler = function(e) {
            try {
                var data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
                // TradingView postMessage format varies — check common patterns
                var sym = null;
                if (data && data.name === 'tv-widget-load' && data.data && data.data.symbol) {
                    sym = data.data.symbol;
                } else if (data && data.name === 'widgetReady' && data.data && data.data.symbol) {
                    sym = data.data.symbol;
                } else if (data && data.name === 'quoteUpdate' && data.data && data.data.original_name) {
                    sym = data.data.original_name;
                } else if (data && data.symbolName) {
                    sym = data.symbolName;
                } else if (data && data.symbol) {
                    sym = data.symbol;
                }
                if (sym) {
                    var bare = sym.indexOf(':') !== -1 ? sym.split(':')[1] : sym;
                    if (bare && bare !== _lastSym) {
                        _lastSym = bare;
                        updateChartModalHeader(bare);
                    }
                }
            } catch(err) {}
        };
        window.addEventListener('message', _chartModalMsgHandler);
    }
    window.closeChartModal = function() {
        document.getElementById('chart-modal-overlay').classList.remove('open');
        if (_chartModalObserver) { _chartModalObserver.disconnect(); _chartModalObserver = null; }
        if (_chartModalMsgHandler) { window.removeEventListener('message', _chartModalMsgHandler); _chartModalMsgHandler = null; }
    };
    document.addEventListener('keydown', function(e) {
        // Always handle Escape first
        if (e.key === 'Escape') {
            if (document.getElementById('mc-fullscreen-overlay').classList.contains('open')) {
                closeMcFullscreen(); return;
            }
            if (document.getElementById('chart-modal-overlay').classList.contains('open')) {
                closeChartModal(); return;
            }
            if (currentView === 'industry-stocks') { backToIndustries(); return; }
            return;
        }

        // Don't hijack input fields
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

        var modalOpen = document.getElementById('chart-modal-overlay').classList.contains('open');

        // ── Industries view ───────────────────────────────────────────────
        if (currentView === 'industries' || currentView === 'sector') {
            allIndustryRows = Array.from(document.querySelectorAll('.industry-row'));
            if (!allIndustryRows.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentIndustryIndex = Math.min(currentIndustryIndex + 1, allIndustryRows.length - 1);
                allIndustryRows.forEach(function(r){ r.style.background = ''; });
                allIndustryRows[currentIndustryIndex].style.background = '#1c2128';
                allIndustryRows[currentIndustryIndex].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentIndustryIndex = Math.max(currentIndustryIndex - 1, 0);
                allIndustryRows.forEach(function(r){ r.style.background = ''; });
                allIndustryRows[currentIndustryIndex].style.background = '#1c2128';
                allIndustryRows[currentIndustryIndex].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'Enter' && currentIndustryIndex >= 0) {
                e.preventDefault();
                var indRow = allIndustryRows[currentIndustryIndex];
                var ind = indRow.getAttribute('data-industry');
                if (ind) openIndustry(ind);
            }
            return;
        }

        // ── Industry stocks + Scans views ────────────────────────────────
        if (currentView === 'industry-stocks' || currentView === 'scans') {
            if (!allStockRows.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentStockIndex = Math.min(currentStockIndex + 1, allStockRows.length - 1);
                var r = allStockRows[currentStockIndex];
                allStockRows.forEach(function(x){ x.classList.remove('active'); });
                r.classList.add('active');
                r.scrollIntoView({ block: 'nearest' });
                if (modalOpen) openChartModal(r.getAttribute('data-symbol'), r.getAttribute('data-sector')||'', r.getAttribute('data-industry')||'');
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentStockIndex = Math.max(currentStockIndex - 1, 0);
                var r = allStockRows[currentStockIndex];
                allStockRows.forEach(function(x){ x.classList.remove('active'); });
                r.classList.add('active');
                r.scrollIntoView({ block: 'nearest' });
                if (modalOpen) openChartModal(r.getAttribute('data-symbol'), r.getAttribute('data-sector')||'', r.getAttribute('data-industry')||'');
            } else if (e.key === 'Enter' && currentStockIndex >= 0) {
                e.preventDefault();
                var r = allStockRows[currentStockIndex];
                openChartModal(r.getAttribute('data-symbol'), r.getAttribute('data-sector')||'', r.getAttribute('data-industry')||'');
            }
            return;
        }

        // ── Watchlists view ───────────────────────────────────────────────
        if (currentView === 'watchlists') {
            var wlRows = Array.from(document.querySelectorAll('.wl-ticker-row'));
            if (!wlRows.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentWlIndex = Math.min(currentWlIndex + 1, wlRows.length - 1);
                var r = wlRows[currentWlIndex];
                r.scrollIntoView({ block: 'nearest' });
                wlSelectTicker(r.getAttribute('data-wl-ticker'));
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentWlIndex = Math.max(currentWlIndex - 1, 0);
                var r = wlRows[currentWlIndex];
                r.scrollIntoView({ block: 'nearest' });
                wlSelectTicker(r.getAttribute('data-wl-ticker'));
            } else if (e.key === 'Enter' && currentWlIndex >= 0) {
                e.preventDefault();
                var r = wlRows[currentWlIndex];
                var ticker = r.getAttribute('data-wl-ticker');
                if (ticker) openChartModal(ticker);
            }
            return;
        }
    });

    // ── Scan filters (dynamic rows) ───────────────────────────────────────
    var sfRows  = [];   // array of filter rule objects

    var SF_TYPES = [
        { value: 'ma',    label: 'Moving Average' },
        { value: 'rs',    label: 'RS' },
        { value: 'price', label: 'Price' },
        { value: 'vol',   label: 'Avg Vol' },

    function sfParseVol(str) {
        str = String(str || '').trim().toUpperCase().replace(/,/g,'');
        if (str.endsWith('M')) return parseFloat(str) * 1e6;
        if (str.endsWith('K')) return parseFloat(str) * 1e3;
        return parseFloat(str);
    }

    function sfParseMcap(str) {
        str = String(str || '').trim().toUpperCase().replace(/,/g,'');
        if (str.endsWith('B')) return parseFloat(str) * 1e9;
        if (str.endsWith('M')) return parseFloat(str) * 1e6;
        if (str.endsWith('K')) return parseFloat(str) * 1e3;
        return parseFloat(str);
    }

    function sfPillLabel(row) {
        var type = SF_TYPES.find(function(t){ return t.value === row.type; });
        var typeLabel = type ? type.label : row.type;
        if (row.type === 'ma') {
            var cond = row.maCondition || 'above_price';
            var mt = row.maType || 'SMA'; var mp = row.maPeriod || 50;
            var mt2 = row.maType2 || 'SMA'; var mp1 = row.maPeriod1 || 5; var mp2 = row.maPeriod2 || 50;
            if (cond === 'above_price')   return 'Price above ' + mt + ' ' + mp;
            if (cond === 'below_price')   return 'Price below ' + mt + ' ' + mp;
            if (cond === 'above_pct')     return mt + ' ' + mp + ' dist greater than ' + (row.val||0) + '%';
            if (cond === 'below_pct')     return mt + ' ' + mp + ' dist less than ' + (row.val||0) + '%';
            if (cond === 'between_pct')   return mt + ' ' + mp + ' dist between ' + (row.val||0) + '% and ' + (row.val2!=null?row.val2:10) + '%';
            if (cond === 'ma_above')      return mt + ' ' + mp1 + ' above ' + mt2 + ' ' + mp2;
            if (cond === 'ma_below')      return mt + ' ' + mp1 + ' below ' + mt2 + ' ' + mp2;
            if (cond === 'crosses_above') return mt + ' ' + mp1 + ' crossed above ' + mt2 + ' ' + mp2;
            if (cond === 'crosses_below') return mt + ' ' + mp1 + ' crossed below ' + mt2 + ' ' + mp2;
            return 'MA filter';
        }
        if (row.type === 'pattern') {
            var patLabels = { inside_day: 'Inside Day', bullish_outside: 'Bullish Outside', hammer: 'Hammer', bullish_reversal_bar: 'Bullish Reversal Bar', upside_reversal: 'Upside Reversal', oops_reversal: 'Oops Reversal', pocket_pivot: 'Pocket Pivot' };
            return patLabels[row.val] || row.val;
        }
        var dirLabel = row.dir === 'gt' ? 'greater than' : 'less than';
        var valLabel = row.val !== '' && row.val != null ? ' ' + row.val : '';
        if (row.type === 'adr' || row.type === 'cr') valLabel += '%';
        if (row.type === 'rvol') valLabel += 'x';
        return typeLabel + ' ' + dirLabel + valLabel;
    }

    function sfRenderPills() {
        var container = document.getElementById('sf-pills-container');
        if (!container) return;
        container.innerHTML = sfRows.map(function(row) {
            return '<span class="sf-pill" onclick="sfOpenPopover(' + row.id + ',this)">' +
                esc(sfPillLabel(row)) +
                '<button class="sf-pill-x" onclick="event.stopPropagation();sfRemoveRow(' + row.id + ')">\u00d7</button>' +
                '</span>';
        }).join('');
    }

    function sfPopoverHtml(row) {
        var id = row.id;
        var typeOpts = SF_TYPES.map(function(t){
            return '<option value="'+t.value+'"'+(row.type===t.value?' selected':'')+'>'+t.label+'</option>';
        }).join('');
        var html = '<div class="sf-popover-row">' +
            '<span class="sf-popover-label">Type</span>' +
            '<select class="sf-select" onchange="sfPopChange('+id+',\'type\',this.value)">'+typeOpts+'</select>' +
            '</div>';
        if (row.type === 'ma') {
            var MA_P = ['5','8','10','21','50','65','150','200'];
            var cond = row.maCondition || 'above_price';
            var condOpts = [
                ['above_price',   'Price Above'],
                ['below_price',   'Price Below'],
                ['above_pct',     'Above % (Dist)'],
                ['below_pct',     'Below % (Dist)'],
                ['between_pct',   'Between % (Dist)'],
                ['ma_above',      'MA Above MA'],
                ['ma_below',      'MA Below MA'],
                ['crosses_above', 'Crosses Above'],

            ].map(function(o){ return '<option value="'+o[0]+'"'+(cond===o[0]?' selected':'')+'>'+o[1]+'</option>'; }).join('');
            html += '<div class="sf-popover-row"><span class="sf-popover-label">Condition</span><select class="sf-select" onchange="sfPopChange('+id+',\'maCondition\',this.value)">'+condOpts+'</select></div>';
            // Single MA pickers (price above/below, dist)
            var usesSingleMA = ['above_price','below_price','above_pct','below_pct','between_pct'].indexOf(cond) !== -1;
            var usesDualMA   = ['ma_above','ma_below','crosses_above','crosses_below'].indexOf(cond) !== -1;
            var usesPct      = ['above_pct','below_pct'].indexOf(cond) !== -1;
            var usesBetween  = cond === 'between_pct';
            var mt  = ['SMA','EMA'].map(function(t){ return '<option value="'+t+'"'+(row.maType===t?' selected':'')+'>'+t+'</option>'; }).join('');
            var mp  = MA_P.map(function(p){ return '<option value="'+p+'"'+(String(row.maPeriod)===p?' selected':'')+'>'+p+'</option>'; }).join('');
            var mt2 = ['SMA','EMA'].map(function(t){ return '<option value="'+t+'"'+(row.maType2===t?' selected':'')+'>'+t+'</option>'; }).join('');
            var mp1 = MA_P.map(function(p){ return '<option value="'+p+'"'+(String(row.maPeriod1)===p?' selected':'')+'>'+p+'</option>'; }).join('');

            if (usesSingleMA) {

                html += '<div class="sf-popover-row"><span class="sf-popover-label">Slow MA</span><select class="sf-select" style="width:70px;" onchange="sfPopChange('+id+',\'maType2\',this.value)">'+mt2+'</select><select class="sf-select" style="width:70px;margin-left:4px;" onchange="sfPopChange('+id+',\'maPeriod2\',this.value)">'+mp2+'</select></div>';
            }
