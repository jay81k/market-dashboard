            }

                html += '<div class="sf-popover-row"><span class="sf-popover-label">Max</span><input class="sf-input" type="number" step="0.1" value="'+(row.val2!=null?row.val2:10)+'" oninput="sfPopChange('+id+',\'val2\',this.value)"><span style="color:#6e7681;font-size:0.748em;margin-left:2px;">%</span></div>';
            }
        } else if (row.type === 'pattern') {

                ['upside_reversal',     'Upside Reversal'],
                ['oops_reversal',       'Oops Reversal'],
                ['pocket_pivot',        'Pocket Pivot'],
            ].map(function(o){ return '<option value="'+o[0]+'"'+(row.val===o[0]?' selected':'')+'>'+o[1]+'</option>'; }).join('');
            html += '<div class="sf-popover-row"><span class="sf-popover-label">Pattern</span><select class="sf-select" onchange="sfPopChange('+id+',\'val\',this.value)">'+patOpts+'</select></div>';
        } else {
            var dirOpts2 = '<option value="gt"'+(row.dir==='gt'?' selected':'')+'>Greater than</option><option value="lt"'+(row.dir==='lt'?' selected':'')+'>Less than</option>';
            html += '<div class="sf-popover-row"><span class="sf-popover-label">Direction</span><select class="sf-select" onchange="sfPopChange('+id+',\'dir\',this.value)">'+dirOpts2+'</select></div>';
            var inputType = (row.type === 'vol' || row.type === 'mcap') ? 'text' : 'number';
            var minMax = row.type === 'cr' ? ' min="0" max="100" step="1"' : row.type === 'rvol' ? ' min="0.1" max="20" step="0.1"' : row.type === 'adr' ? ' min="0" step="0.1"' : row.type === 'price' ? ' min="0" step="0.01"' : '';
            var suffix = (row.type === 'adr' || row.type === 'cr') ? '<span style="color:#6e7681;font-size:0.748em;margin-left:2px;">%</span>' : row.type === 'rvol' ? '<span style="color:#6e7681;font-size:0.748em;margin-left:2px;">x</span>' : '';
            html += '<div class="sf-popover-row"><span class="sf-popover-label">Value</span><input class="sf-input" type="'+inputType+'"'+minMax+' value="'+row.val+'" oninput="sfPopChange('+id+',\'val\',this.value)">'+suffix+'</div>';
        }
        return html;
    }

    window.sfPopChange = function(id, field, value) {
        var row = sfRows.find(function(r){ return r.id === id; });
        if (!row) return;
        if (field === 'type') {
            row.type     = value;
            row.dir         = (value === 'ma') ? 'above' : 'gt';
            row.maCondition = 'above_price';
            row.val         = value === 'rs' ? 70 : value === 'price' ? 5 : value === 'vol' ? '500K' : value === 'adr' ? 3 : value === 'cr' ? 50 : value === 'mcap' ? '1B' : value === 'rvol' ? 1 : value === 'pattern' ? 'inside_day' : 0;
            row.maType      = 'SMA';
            row.maPeriod    = 50;
            row.maType2     = 'SMA';
            row.maPeriod1   = 5;
            row.maPeriod2   = 50;
            document.getElementById('sf-popover-content').innerHTML = sfPopoverHtml(row);
        } else {
            if (field === 'maPeriod' || field === 'maPeriod1' || field === 'maPeriod2') value = parseInt(value);
            row[field] = value;
            // When condition changes, reset val for pct modes
            if (field === 'maCondition') {
                if ((value === 'above_pct' || value === 'below_pct') && (row.val === '' || row.val == null)) row.val = 0;
                if (value === 'between_pct') { if (row.val == null) row.val = 0; if (row.val2 == null) row.val2 = 10; }

        var preset = presets[name];
        if (!preset) return;
        sfDownloadJson({ presets: { [name]: preset } }, 'preset-' + name.replace(/[^a-z0-9]/gi, '_') + '.json');
    };

    function sfDownloadJson(obj, filename) {
        var blob = new Blob([JSON.stringify(obj, null, 2)], { type: 'application/json' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    window.sfImportFile = function(input) {
        var file = input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var data = JSON.parse(e.target.result);
                if (!data.presets) { alert('Invalid preset file.'); return; }
                var existing = sfGetAllPresets();
                var imported = 0;
                Object.keys(data.presets).forEach(function(name) {
                    existing[name] = data.presets[name];
                    imported++;
                });
                sfSaveAllPresets(existing);
                document.getElementById('sf-preset-dropdown').classList.remove('open');
                alert('Imported ' + imported + ' preset' + (imported !== 1 ? 's' : '') + ' successfully.');
            } catch(err) {
                alert('Failed to read preset file.');
            }
        };
        reader.readAsText(file);
        input.value = '';
    };

    function applyFilters(stocks) {
        return stocks.filter(function(r) {
            for (var i = 0; i < sfRows.length; i++) {
                var f = sfRows[i];
                if (f.type === 'ma') {
                    var cond = f.maCondition || 'above_price';
                    var key  = (f.maType||'SMA') + (f.maPeriod||50);
                    var k1   = (f.maType||'SMA')  + (f.maPeriod1||5);
                    var k2   = (f.maType2||'SMA') + (f.maPeriod2||50);
                    if (cond === 'above_price') {
                        var dist = r.dist_ma ? r.dist_ma[key] : null;
                        if (dist == null || dist <= 0) return false;
                    } else if (cond === 'below_price') {
                        var dist = r.dist_ma ? r.dist_ma[key] : null;
                        if (dist == null || dist >= 0) return false;
                    } else if (cond === 'above_pct') {
                        var dist = r.dist_ma ? r.dist_ma[key] : null;
                        var thresh = parseFloat(f.val);
                        if (dist == null || (!isNaN(thresh) && dist <= thresh)) return false;
                    } else if (cond === 'below_pct') {
                        var dist = r.dist_ma ? r.dist_ma[key] : null;
                        var thresh = parseFloat(f.val);
                        if (dist == null || (!isNaN(thresh) && dist >= thresh)) return false;
                    } else if (cond === 'between_pct') {
                        var dist = r.dist_ma ? r.dist_ma[key] : null;
                        var tMin = parseFloat(f.val);
                        var tMax = parseFloat(f.val2);
                        if (dist == null) return false;
                        if (!isNaN(tMin) && dist < tMin) return false;
                        if (!isNaN(tMax) && dist > tMax) return false;
                    } else if (cond === 'ma_above') {
                        var v1 = r.ma_val ? r.ma_val[k1] : null;
                        var v2 = r.ma_val ? r.ma_val[k2] : null;
                        if (v1 == null || v2 == null || v1 <= v2) return false;
                    } else if (cond === 'ma_below') {
                        var v1 = r.ma_val ? r.ma_val[k1] : null;
                        var v2 = r.ma_val ? r.ma_val[k2] : null;
                        if (v1 == null || v2 == null || v1 >= v2) return false;
                    } else if (cond === 'crosses_above') {
                        var xKey = k1 + '|' + k2 + '|above';
                        if ((r.ma_crossovers || []).indexOf(xKey) === -1) return false;
                    } else if (cond === 'crosses_below') {
                        var xKey = k1 + '|' + k2 + '|below';
                        if ((r.ma_crossovers || []).indexOf(xKey) === -1) return false;
                    }
                } else if (f.type === 'rs') {
                    var rs = r.Percentile;
                    if (rs == null) return false;
                    var rv = parseFloat(f.val);
                    if (!isNaN(rv)) {
                        if (f.dir === 'gt' && rs <= rv) return false;
                        if (f.dir === 'lt' && rs >= rv) return false;
                    }
                } else if (f.type === 'price') {
                    var pr = r.price;
                    if (pr == null) return false;
                    var pv = parseFloat(f.val);
                    if (!isNaN(pv)) {
                        if (f.dir === 'gt' && pr <= pv) return false;
                        if (f.dir === 'lt' && pr >= pv) return false;
                    }
                } else if (f.type === 'vol') {
                    var vol = r.AvgVol50;
                    if (vol == null) return false;
                    var vv = sfParseVol(f.val);
                    if (!isNaN(vv)) {
                        if (f.dir === 'gt' && vol <= vv) return false;
                        if (f.dir === 'lt' && vol >= vv) return false;
                    }
                } else if (f.type === 'adr') {
                    var adr = r.adr_pct;
                    if (adr == null) return false;
                    var av = parseFloat(f.val);
                    if (!isNaN(av)) {
                        if (f.dir === 'gt' && adr <= av) return false;
                        if (f.dir === 'lt' && adr >= av) return false;
                    }
                } else if (f.type === 'pattern') {
                    if (f.val === 'inside_day'      && !r.inside_day)      return false;
                    if (f.val === 'bullish_outside' && !r.bullish_outside) return false;
                    if (f.val === 'hammer'               && !r.hammer)               return false;
                    if (f.val === 'bullish_reversal_bar' && !r.bullish_reversal_bar) return false;
                    if (f.val === 'upside_reversal'      && !r.upside_reversal)      return false;
                    if (f.val === 'oops_reversal'        && !r.oops_reversal)        return false;
                    if (f.val === 'pocket_pivot'         && !r.pocket_pivot)          return false;
                } else if (f.type === 'rvol') {
                    var rv = r.rel_vol;
                    if (rv == null) return false;
                    var rvThresh = parseFloat(f.val);
                    if (!isNaN(rvThresh)) {
                        if (f.dir === 'gt' && rv <= rvThresh) return false;
                        if (f.dir === 'lt' && rv >= rvThresh) return false;
                    }
                } else if (f.type === 'cr') {
                    var cr = r.cr;
                    if (cr == null) return false;
                    var cv = parseFloat(f.val);
                    if (!isNaN(cv)) {
                        if (f.dir === 'gt' && cr <= cv) return false;
                        if (f.dir === 'lt' && cr >= cv) return false;
                    }
                } else if (f.type === 'mcap') {
                    var mc = r.MarketCap;
                    if (mc == null) return false;
                    var mv = sfParseMcap(f.val);
                    if (!isNaN(mv)) {
                        if (f.dir === 'gt' && mc <= mv) return false;
                        if (f.dir === 'lt' && mc >= mv) return false;
                    }
                }
            }
            return true;
        });
    }

        ];
        var html = '<tr>';

                else { scansSortState.by = key; scansSortState.dir = -1; }

    function renderScans() {
        var stocks = getAllStocks();
        var filtered = activeScan
            ? stocks.filter(function(r) { return r[activeScan] === true; })
            : stocks.slice();
        filtered = applyFilters(filtered);

        // Sort
        filtered.sort(function(a, b) {
            var key = scansSortState.by;
            var av, bv;
            if (key === 'symbol')   { av = a.ticker;    bv = b.ticker;    return av < bv ? scansSortState.dir : av > bv ? -scansSortState.dir : 0; }
            if (key === 'sector')   { av = a.sector;    bv = b.sector;    return av < bv ? scansSortState.dir : av > bv ? -scansSortState.dir : 0; }
            if (key === 'industry') { av = a.industry;  bv = b.industry;  return av < bv ? scansSortState.dir : av > bv ? -scansSortState.dir : 0; }
            if (key === 'rs')       { av = a.Percentile; bv = b.Percentile; }
            else if (key === 'chg')      { av = a.price != null && a.daily != null ? (a.price/(1+a.daily/100))*(a.daily/100) : null; bv = b.price != null && b.daily != null ? (b.price/(1+b.daily/100))*(b.daily/100) : null; }
            else if (key === 'price')    { av = a.price;     bv = b.price; }
            else if (key === 'daily')    { av = a.daily;     bv = b.daily; }
            else if (key === '1w')       { av = a['1w'];     bv = b['1w']; }
            else if (key === '1m')       { av = a['1m'];     bv = b['1m']; }
            else if (key === '3m')       { av = a['3m'];     bv = b['3m']; }
            else if (key === 'ytd')      { av = a.ytd;       bv = b.ytd; }
            else if (key === 'vs_spy')   { av = a.vs_spy;    bv = b.vs_spy; }
            else if (key === 'vs_spy_3m'){ av = a.vs_spy_3m; bv = b.vs_spy_3m; }
            else if (key === 'avg_vol')  { av = a.AvgVol50;  bv = b.AvgVol50; }
            else if (key === 'pct_52wk') { av = a.PctFrom52WkHigh; bv = b.PctFrom52WkHigh; }
            else if (key === 'adr_pct')  { av = a.adr_pct;   bv = b.adr_pct; }
            else if (key === 'cr')       { av = a.cr;        bv = b.cr; }
            else if (key === 'dist_ma')  { av = a.dist_ma ? a.dist_ma[activeMAType+activeMALength] : null; bv = b.dist_ma ? b.dist_ma[activeMAType+activeMALength] : null; }
            else { av = null; bv = null; }
            if (av == null && bv == null) return 0;
            if (av == null) return 1;
            if (bv == null) return -1;
            return (av - bv) * scansSortState.dir;
        });

        scansMcTickers = filtered.map(function(r) { return r.ticker; });
        document.getElementById('scans-result-count').textContent = filtered.length + ' stocks';

        buildScansHeader();

        var html = '';
        filtered.forEach(function(row) {
            var rsVal = row.Percentile != null ? row.Percentile : '—';
            var priceVal = row.price != null ? '$' + row.price.toFixed(2) : '—';
            var distVal = (row.dist_ma && row.dist_ma[activeMAType+activeMALength] != null) ? row.dist_ma[activeMAType+activeMALength] : null;
            var distAll = row.dist_ma || {};
            var adrVal = row.adr_pct != null ? row.adr_pct.toFixed(1)+'%' : '—';
            var volVal = '—';
            if (row.AvgVol50 != null) {
                var v = row.AvgVol50;
                volVal = v >= 1e6 ? (v/1e6).toFixed(1)+'M' : v >= 1e3 ? (v/1e3).toFixed(0)+'K' : v.toFixed(0);
            }
            var adrColor = '#484f58';
            if (row.adr_pct != null) {
                if (row.adr_pct < 4) adrColor = '#3fb950';
                else if (row.adr_pct < 8) adrColor = '#e3852b';
                else adrColor = '#f85149';
            }
            var crVal = row.cr != null ? Math.round(row.cr)+'%' : '—';
            var secCl = sectorClass(row.sector);

            var isAdded = selectedScans.has(row.ticker);
            html += '<tr class="stock-row" data-symbol="' + esc(row.ticker) + '" data-sector="' + esc(row.sector||'') + '" data-industry="' + esc(row.industry||'') + '">';
            var addIcon = isAdded
                ? '<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#3fb950" stroke-width="2.2"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>'
                : '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#484f58" stroke-width="2"><line x1="5" y1="1" x2="5" y2="9"/><line x1="1" y1="5" x2="9" y2="5"/></svg>';
            html += '<td onclick="event.stopPropagation()" style="white-space:nowrap;">' +
                '<button class="scan-add-btn' + (isAdded ? ' added' : '') + '" data-ticker="' + esc(row.ticker) + '" onclick="event.stopPropagation();sfToggleAdd(this)">' + addIcon + '</button>' +
                '<button class="wl-add-btn" data-ticker="' + esc(row.ticker) + '" onclick="event.stopPropagation();wlQuickToggle(this)" title="Add to watchlist">☆</button>' +
                '<button class="wl-pick-btn" data-ticker="' + esc(row.ticker) + '" onclick="event.stopPropagation();wlOpenPicker(this,event)" title="Choose watchlist">▾</button>' +

    function wlSearchQuery(q) {
        var scroll = document.getElementById('wl-list-scroll');
        if (!q || !q.trim()) {
            wlRender();

        q = q.trim().toUpperCase();
        var all   = wlGetAll();

        // Gather matches across all lists
        var matches = [];
        order.forEach(function(listName) {
            var tickers = all[listName] || [];
            tickers.forEach(function(t) {
                if (t.toUpperCase().indexOf(q) !== -1) {
                    matches.push({ ticker: t, list: listName });
                }
            });
        });

        if (!matches.length) {
            scroll.innerHTML = '<div class="wl-empty-state">No matches for "' + esc(q) + '"</div>';
            return;

        html += '</div>';

        matches.forEach(function(m) {
            var live = wlLivePrices[m.ticker];
            var sd   = wlLookupStock(m.ticker);
            var price, dayVal;
            if (live) {
                price  = live.price;
                dayVal = live.prevClose ? ((live.price - live.prevClose) / live.prevClose) * 100 : null;
            } else {
                price  = sd && sd.price != null ? sd.price : null;
                dayVal = sd ? sd.daily : null;
            }
            var priceStr = price != null ? price.toFixed(2) : '—';
            var chgpStr  = dayVal != null ? (dayVal >= 0 ? '+' : '') + dayVal.toFixed(2) + '%' : '';
            var cl       = dayVal == null ? '' : dayVal > 0 ? 'up' : dayVal < 0 ? 'down' : '';

            html += '<div class="wl-ticker-row" data-wl-ticker="' + esc(m.ticker) + '" data-wl-list="' + esc(m.list) + '" style="cursor:pointer;">';
            html += '<span class="wl-c-sym">' + esc(m.ticker) + '</span>';

            html += '<span class="wl-c-last" style="margin-left:auto;">' + priceStr + '</span>';
            html += '<span class="wl-c-chgp ' + cl + '" style="width:52px;text-align:right;font-size:0.858em;">' + chgpStr + '</span>';
            html += '</div>';
        });

        scroll.innerHTML = html;

        scroll.querySelectorAll('.wl-ticker-row').forEach(function(row) {

                wlSelectTicker(ticker);
            });
        });

    // ── Watchlist live prices ─────────────────────────────────────────────
    function wlIsMarketOpen() {
        var now = new Date();
        var et  = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
        var day = et.getDay();
        if (day === 0 || day === 6) return false;
        var h = et.getHours(), m = et.getMinutes();
        var mins = h * 60 + m;
        return mins >= 570 && mins < 960; // 9:30–16:00 ET
    }

    function wlFetchOneTicker(ticker) {
        var url = WL_PROXY + '?symbol=' + encodeURIComponent(ticker) + '&interval=1d&range=2d';
        return fetch(url).then(function(r) {
            if (!r.ok) return null;
            return r.json();
        }).then(function(data) {
            var result = data && data.chart && data.chart.result && data.chart.result[0];
            if (!result) return null;
            var price     = result.meta && result.meta.regularMarketPrice;
            var prevClose = result.meta && result.meta.previousClose;
            if (!price || price <= 0) return null;
            return { price: price, prevClose: prevClose || null };
        }).catch(function() { return null; });
    }

    function wlFetchPrices() {
        var active  = wlGetLastList();
        var all     = wlGetAll();
        var tickers = active && all[active] ? all[active] : [];
        if (!tickers.length) return;

        Promise.all(tickers.map(function(t) {
            return wlFetchOneTicker(t).then(function(data) {
                if (data) {
                    wlLivePrices[t] = {
                        price:     data.price,
                        prevClose: data.prevClose,
                        updatedAt: new Date()
                    };
                }
            });
        })).then(function() {
            wlUpdatePriceRows();
        });
    }

    function wlUpdatePriceRows() {
        document.querySelectorAll('.wl-ticker-row').forEach(function(row) {
            var t    = row.getAttribute('data-wl-ticker');
            var live = wlLivePrices[t];
            if (!live || !live.price) return;
            var price     = live.price;
            var prevClose = live.prevClose;
            var chgAbs    = (prevClose && prevClose > 0) ? price - prevClose : null;
            var chgPct    = (prevClose && prevClose > 0) ? ((price - prevClose) / prevClose) * 100 : null;
            // Fall back to snapshot daily if no prevClose from live
            if (chgPct == null) {
                var sd = wlLookupStock(t);
                if (sd && sd.daily != null) {
                    chgPct = sd.daily;
                    chgAbs = sd.price ? (sd.price / (1 + sd.daily / 100)) * (sd.daily / 100) : null;
                }
            }
            var cl     = chgPct == null ? 'neutral' : chgPct > 0 ? 'up' : chgPct < 0 ? 'down' : 'neutral';
            var lastEl = row.querySelector('.wl-c-last');
            var chgEl  = row.querySelector('.wl-c-chg');
            var chgpEl = row.querySelector('.wl-c-chgp');
            if (lastEl) lastEl.textContent = price.toFixed(2);
            if (chgEl)  { chgEl.textContent = chgAbs != null ? (chgAbs >= 0 ? '+' : '') + chgAbs.toFixed(2) : '—'; chgEl.className = 'wl-c-chg ' + cl; }
            if (chgpEl) { chgpEl.textContent = chgPct != null ? (chgPct >= 0 ? '+' : '') + chgPct.toFixed(2) + '%' : '—'; chgpEl.className = 'wl-c-chgp ' + cl; }
        });
    }

    function wlStartPricePolling() {
        if (wlPriceTimer) clearInterval(wlPriceTimer);
        wlFetchPrices();
        if (!wlIsMarketOpen()) return;
        wlPriceTimer = setInterval(function() {
            if (currentView !== 'watchlists') return;
            if (!wlIsMarketOpen()) { wlStopPricePolling(); return; }
            wlFetchPrices();
        }, 5 * 60 * 1000);
    }

    function wlStopPricePolling() {
        if (wlPriceTimer) { clearInterval(wlPriceTimer); wlPriceTimer = null; }
    }

    // ── Watchlists ────────────────────────────────────────────────────────
    var WL_FLAGGED = 'Flagged';

    function wlIsFlagged(ticker) {
        var all = wlGetAll();
        return !!(all[WL_FLAGGED] && all[WL_FLAGGED].indexOf(ticker) !== -1);
    }

    window.wlFlagTicker = function(ticker, btn) {
        var all = wlGetAll();
        if (!all[WL_FLAGGED]) {
            all[WL_FLAGGED] = [];
            var order = [];
            try { order = JSON.parse(localStorage.getItem(LS_WL_ORD_KEY) || '[]'); } catch(e) {}
            if (order.indexOf(WL_FLAGGED) === -1) order.unshift(WL_FLAGGED); // put Flagged first
            wlSaveOrder(order);
            wlSetLastList(WL_FLAGGED);
        }
        var idx = all[WL_FLAGGED].indexOf(ticker);
        if (idx !== -1) {
            all[WL_FLAGGED].splice(idx, 1);
            if (btn) { btn.classList.remove('flagged'); btn.title = 'Add to Flagged'; }
        } else {
            all[WL_FLAGGED].push(ticker);
            if (btn) { btn.classList.add('flagged'); btn.title = 'Remove from Flagged'; }
        }
        wlSaveAll(all);
        if (currentView === 'watchlists') wlRender();
        wlRefreshStars();
    };
    var LS_WL_KEY      = 'dashboard-watchlists';
    var LS_WL_ORD_KEY  = 'dashboard-watchlists-order';
    var LS_WL_LAST_KEY = 'dashboard-watchlists-last';
    var wlChartTf      = 'D';
    var wlChartTicker  = null;
    var wlChartWidget  = null;
    var wlMcActive     = false;
    var wlMcTimeframe  = 'D';
    var wlMcWidgets    = {};
    var wlLivePrices   = {};   // { ticker: { price, prevClose, updatedAt } }
    var wlPriceTimer   = null;
    var WL_PROXY       = 'https://yahoo-proxy.jay69k.workers.dev';
    var wlPickerTicker = null;
    var wlPickerOpen   = false;
    var wlPickerBtn    = null;
    var wlPickerJustOpened = false;

    function wlGetLastList() {
        var last = localStorage.getItem(LS_WL_LAST_KEY);
        var all  = wlGetAll();
        // Validate it still exists
        if (last && all[last]) return last;
        // Fall back to first list in order
        var order = wlGetOrder();
        return order.length ? order[0] : null;
    }
    function wlSetLastList(name) {
        try { localStorage.setItem(LS_WL_LAST_KEY, name); } catch(e) {}
    }

    function wlGetAll() {
        try { return JSON.parse(localStorage.getItem(LS_WL_KEY) || '{}'); } catch(e) { return {}; }
    }
    function wlGetOrder() {
        try {
            var all = wlGetAll();
            var ord = JSON.parse(localStorage.getItem(LS_WL_ORD_KEY) || '[]');
            // Add any missing keys
            Object.keys(all).forEach(function(k){ if (ord.indexOf(k) === -1) ord.push(k); });
            return ord.filter(function(k){ return k in all; });
        } catch(e) { return Object.keys(wlGetAll()); }
    }
    function wlSaveAll(obj) {
        try { localStorage.setItem(LS_WL_KEY, JSON.stringify(obj)); } catch(e) {}
    }
    function wlSaveOrder(arr) {
        try { localStorage.setItem(LS_WL_ORD_KEY, JSON.stringify(arr)); } catch(e) {}
    }

    function wlAllTickers() {
        var all = wlGetAll();
        var set = new Set();
        Object.values(all).forEach(function(tickers){ tickers.forEach(function(t){ set.add(t); }); });
        return set;
    }

    // Refresh star buttons across visible stock rows
    function wlRefreshStars() {
        var last   = wlGetLastList();
        var all    = wlGetAll();
        var inLast = last && all[last] ? new Set(all[last]) : new Set();
        var inAny  = wlAllTickers();
        document.querySelectorAll('.wl-add-btn').forEach(function(btn) {
            var t = btn.getAttribute('data-ticker');
            var active = inLast.has(t);
            btn.classList.toggle('in-wl', active);
            btn.textContent = active ? '★' : '☆';
            btn.title = active ? 'Remove from "' + (last||'') + '"' : (last ? 'Add to "' + last + '"' : 'Add to watchlist');
        });
        document.querySelectorAll('.wl-pick-btn').forEach(function(btn) {
            var t = btn.getAttribute('data-ticker');
            btn.classList.toggle('in-wl', inAny.has(t));
        });
    }

    // Update only buttons for one ticker — safe to call while picker is open
    function wlRefreshTickerStar(ticker) {
        var last   = wlGetLastList();
        var all    = wlGetAll();
        var inLast = last && all[last] ? all[last].indexOf(ticker) !== -1 : false;
        var inAny  = false;
        Object.values(all).forEach(function(arr){ if (arr.indexOf(ticker) !== -1) inAny = true; });
        document.querySelectorAll('.wl-add-btn[data-ticker="' + ticker + '"]').forEach(function(btn) {
            btn.classList.toggle('in-wl', inLast);
            btn.textContent = inLast ? '★' : '☆';
            btn.title = inLast ? 'Remove from "' + (last||'') + '"' : (last ? 'Add to "' + last + '"' : 'Add to watchlist');
        });
        document.querySelectorAll('.wl-pick-btn[data-ticker="' + ticker + '"]').forEach(function(btn) {
            btn.classList.toggle('in-wl', inAny);
        });
    }

    window.wlRender = function() {

        var scroll   = document.getElementById('wl-list-scroll');
        var all      = wlGetAll();
        var order    = wlGetOrder();
        var active   = wlGetLastList();
        var nameEl   = document.getElementById('wl-selector-name');

        // Update selector label
        if (nameEl) nameEl.textContent = active || '— select list —';

        if (!order.length) {
            scroll.innerHTML = '<div class="wl-empty-state">No watchlists yet.<br>Add stocks using the ☆ button<br>on any stock row.</div>';
            return;
        }
        if (!active || !all[active]) {
            scroll.innerHTML = '<div class="wl-empty-state">Select a watchlist above.</div>';
            return;
        }

        var tickers = all[active] || [];
        var nameAttr = esc(active);
        var html = '';

        if (!tickers.length) {
            html = '<div class="wl-empty-state">No stocks in this list yet.</div>';
        } else {
            html += '<div class="wl-col-hdr">';
            html += '<span class="wl-c-sym">Symbol</span>';
            html += '<span class="wl-c-last">Last</span>';
            html += '<span class="wl-c-chg">Chg</span>';
            html += '<span class="wl-c-chgp">Chg%</span>';
            html += '<span class="wl-c-del"></span>';
            html += '</div>';
            tickers.forEach(function(t) {
                var isActive  = (wlChartTicker === t) ? ' active' : '';
                var sd        = wlLookupStock(t);
                var live      = wlLivePrices[t];
                var price, dayVal, chgAbs;
                // Only use live price if we have both price AND prevClose
                if (live && live.price && live.prevClose) {
                    price  = live.price;
                    chgAbs = price - live.prevClose;
                    dayVal = (chgAbs / live.prevClose) * 100;
                } else {
                    // Fall back to snapshot
                    price  = sd && sd.price != null ? sd.price : null;
                    // Use live price only for last price display if prevClose missing
                    if (live && live.price && !price) price = live.price;
                    dayVal = sd ? sd.daily : null;
                    chgAbs = (price != null && dayVal != null) ? (price / (1 + dayVal / 100)) * (dayVal / 100) : null;
                }
                var priceStr  = price != null ? price.toFixed(2) : '—';
                var chgStr    = chgAbs != null ? (chgAbs >= 0 ? '+' : '') + chgAbs.toFixed(2) : '—';
                var chgpStr   = dayVal != null ? (dayVal >= 0 ? '+' : '') + dayVal.toFixed(2) + '%' : '—';
                var cl        = dayVal == null ? 'neutral' : dayVal > 0 ? 'up' : dayVal < 0 ? 'down' : 'neutral';
                html += '<div class="wl-ticker-row' + isActive + '" data-wl-ticker="' + esc(t) + '" data-wl-list="' + nameAttr + '">';
                html += '<span class="wl-c-sym">' + esc(t) + '</span>';
                html += '<span class="wl-c-last">' + priceStr + '</span>';
                html += '<span class="wl-c-chg ' + cl + '">' + chgStr + '</span>';
                html += '<span class="wl-c-chgp ' + cl + '">' + chgpStr + '</span>';
                html += '<button class="wl-ticker-remove" data-wl-remove-ticker="' + esc(t) + '" data-wl-remove-list="' + nameAttr + '" title="Remove">✕</button>';
                html += '</div>';
            });
        }
        scroll.innerHTML = html;
        if (wlMcActive) renderWlMc();
    };

    // Look up a stock's data from snapshot across all industries
    function wlLookupStock(ticker) {
        if (!snapshot || !snapshot.by_industry) return null;
        var industries = snapshot.by_industry;
        for (var ind in industries) {
            var rows = industries[ind];
            for (var i = 0; i < rows.length; i++) {
                if (rows[i].ticker === ticker) return rows[i];
            }
        }
        return null;
    }

        var meta       = result.meta || {};
        var timestamps = result.timestamp || [];
        var closes     = (result.indicators && result.indicators.quote && result.indicators.quote[0] && result.indicators.quote[0].close) || [];

        var points = [], ts = [];
        for (var i = 0; i < timestamps.length; i++) {
            if (closes[i] != null) { points.push(closes[i]); ts.push(timestamps[i]); }
        }

        return {
            price:      meta.regularMarketPrice                      || null,
            prevClose:  meta.previousClose || meta.chartPreviousClose || null,
            points:     points,
            timestamps: ts,
        };
    }

    function marketFmtPrice(v) {
        if (v == null) return '—';
        return v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function marketXLabels(points, timestamps) {
        if (!timestamps || timestamps.length < 2) return '<span></span><span></span><span></span>';
        var fmt = function(ts) {
            var d = new Date(ts * 1000);
            if (marketTf === '1d') {
                return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York' });
            }
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        };
        var n   = timestamps.length;
        var mid = Math.floor(n / 2);
        return '<span>' + fmt(timestamps[0]) + '</span>' +
               '<span>' + fmt(timestamps[mid]) + '</span>' +
               '<span>' + fmt(timestamps[n - 1]) + '</span>';
    }

    function marketSparklineSVG(points, prevClose, direction) {
        if (!points || points.length < 2) return '<div class="mic-chart-wrap"></div>';

        var W = 500, H = 130, padL = 4, padR = 56, padT = 8, padB = 8;
        var chartW = W - padL - padR;
        var chartH = H - padT - padB;

        var allVals = points.slice();
        if (prevClose != null) allVals.push(prevClose);
        var min = Math.min.apply(null, allVals);
        var max = Math.max.apply(null, allVals);
        var range = (max - min) || 1;
        // Add 5% headroom top and bottom
        min -= range * 0.05;
        max += range * 0.05;
        range = max - min;

        var toX = function(i) { return padL + (i / (points.length - 1)) * chartW; };
        var toY = function(v) { return padT + (1 - (v - min) / range) * chartH; };

        // Grid lines at high / mid / low
        var gridVals = [max - range * 0.05, min + range * 0.5, min + range * 0.05];
        var gridLines = gridVals.map(function(v) {
            var y = toY(v).toFixed(1);
            return '<line class="mic-grid-line" x1="' + padL + '" y1="' + y + '" x2="' + (padL + chartW) + '" y2="' + y + '"/>';
        }).join('');

        // Prev-close dashed line
        var pcLine = '';
        if (prevClose != null) {
            var pcy = toY(prevClose).toFixed(1);
            pcLine = '<line class="mic-prev-close-line" x1="' + padL + '" y1="' + pcy + '" x2="' + (padL + chartW) + '" y2="' + pcy + '"/>';
        }

        // Price line + area
        var coords = points.map(function(v, i) {
            return toX(i).toFixed(1) + ',' + toY(v).toFixed(1);
        });
        var pathD  = 'M' + coords.join(' L');
        var lastX  = toX(points.length - 1).toFixed(1);
        var botY   = (padT + chartH).toFixed(1);
        var areaD  = pathD + ' L' + lastX + ',' + botY + ' L' + padL + ',' + botY + ' Z';

        // Current price dot
        var lastV  = points[points.length - 1];
        var dotX   = toX(points.length - 1).toFixed(1);
        var dotY   = toY(lastV).toFixed(1);
        var dot    = '<circle class="mic-current-dot" cx="' + dotX + '" cy="' + dotY + '" r="3.5"/>';

        // Y-axis price labels — high, prev-close, current (coloured badge)
        var hiVal  = Math.max.apply(null, points);
        var loVal  = Math.min.apply(null, points);
        var hiY    = toY(hiVal).toFixed(1);
        var loY    = toY(loVal).toFixed(1);
        var curY   = dotY;
        var labelX = padL + chartW + 4;

        var yLabels =
            '<text x="' + labelX + '" y="' + (parseFloat(hiY) + 3.5) + '" font-size="9" fill="#484f58" font-family="inherit">' + marketFmtPrice(hiVal) + '</text>' +
            '<text x="' + labelX + '" y="' + (parseFloat(loY) + 3.5) + '" font-size="9" fill="#484f58" font-family="inherit">' + marketFmtPrice(loVal) + '</text>';

        // Current price badge (coloured rect + text)
        var curColor = direction === 'up' ? '#3fb950' : direction === 'down' ? '#f85149' : '#484f58';
        var curLabel = marketFmtPrice(lastV);
        var badgeW   = curLabel.length * 5.6 + 8;
        yLabels += '<rect x="' + labelX + '" y="' + (parseFloat(curY) - 8) + '" width="' + badgeW + '" height="13" rx="2" fill="' + curColor + '"/>' +
                   '<text x="' + (labelX + 4) + '" y="' + (parseFloat(curY) + 3) + '" font-size="9" fill="#0d1117" font-weight="700" font-family="inherit">' + curLabel + '</text>';

        // Prev-close label
        if (prevClose != null) {
            var pcy2 = toY(prevClose).toFixed(1);
            yLabels += '<text x="' + labelX + '" y="' + (parseFloat(pcy2) - 2) + '" font-size="8.5" fill="#484f58" font-family="inherit" opacity="0.7">PC ' + marketFmtPrice(prevClose) + '</text>';
        }

        var svg = '<svg class="mic-sparkline ' + direction + '" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">' +
            gridLines + pcLine +
            '<path class="mic-sparkline-area" d="' + areaD + '"/>' +
            '<path class="mic-sparkline-path" d="' + pathD + '"/>' +
            dot + yLabels +
            '</svg>';

        return '<div class="mic-chart-wrap">' + svg + '</div>';
    }

    function marketRenderCard(idx, parsed) {
        var card = document.getElementById('mc-' + idx.id);
        if (!card) return;

        if (!parsed) {
            card.className = 'market-index-card';
            card.innerHTML =
                '<div class="mic-header"><span class="mic-label">' + idx.label + '</span><span class="mic-name">' + idx.name + '</span></div>' +
                '<div class="mic-price-row"><span class="mic-price" style="color:#484f58;">—</span></div>';
            return;
        }

        var price     = parsed.price;
        var prevClose = parsed.prevClose;
        var chgAbs    = (price != null && prevClose != null) ? price - prevClose : null;
        var chgPct    = (chgAbs != null && prevClose > 0) ? (chgAbs / prevClose) * 100 : null;
        var direction = chgPct == null ? 'flat' : chgPct > 0 ? 'up' : chgPct < 0 ? 'down' : 'flat';

        var priceStr  = marketFmtPrice(price);
        var chgAbsStr = chgAbs != null ? (chgAbs >= 0 ? '+' : '') + chgAbs.toFixed(2) : '—';
        var chgPctStr = chgPct != null ? (chgPct >= 0 ? '+' : '') + chgPct.toFixed(2) + '%' : '—';

        var now     = new Date();
        var dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        card.className = 'market-index-card ' + direction;
        card.innerHTML =
            '<div class="mic-header">' +
                '<span class="mic-label">' + idx.label + '</span>' +
                '<span class="mic-name">' + idx.name + '</span>' +
                '<span class="mic-date">' + dateStr + '</span>' +
            '</div>' +
            '<div class="mic-price-row">' +
                '<span class="mic-price">' + priceStr + '</span>' +
                '<div class="mic-change">' +
                    '<span class="mic-chg-abs ' + direction + '">' + chgAbsStr + '</span>' +
                    '<span class="mic-chg-pct ' + direction + '">(' + chgPctStr + ')</span>' +
                '</div>' +
            '</div>' +
            marketSparklineSVG(parsed.points, parsed.prevClose, direction) +
            '<div class="mic-xaxis">' + marketXLabels(parsed.points, parsed.timestamps) + '</div>';
    }

    function marketFetchAll() {
        // Reset to skeleton while loading
        MARKET_INDEXES.forEach(function(idx) {
            var card = document.getElementById('mc-' + idx.id);
            if (card) { card.className = 'market-index-card skeleton'; card.innerHTML = ''; }
        });
        document.getElementById('market-updated').textContent = '';

        Promise.all(MARKET_INDEXES.map(function(idx) {
            return marketFetchOne(idx.symbol).then(function(data) {
                return marketParseResult(data);
            });
        })).then(function(results) {
            MARKET_INDEXES.forEach(function(idx, i) {
                marketRenderCard(idx, results[i]);
            });
            renderMarketBreadth();
            renderMarketHL();
            renderMarketMA();
            var now = new Date();
            var isOpen = wlIsMarketOpen();
            document.getElementById('market-updated').textContent =
                'Updated ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) +
                (isOpen ? '' : ' · Market closed');

            // Only auto-refresh during market hours — set timer once, not on every fetch
            if (!marketTimer) {
                if (isOpen) {
                    marketTimer = setInterval(function() {
                        if (currentView !== 'market') { clearInterval(marketTimer); marketTimer = null; return; }
                        if (!wlIsMarketOpen()) { clearInterval(marketTimer); marketTimer = null; return; }
                        marketFetchAll();
                    }, 60 * 1000);
                }
            }
        });
    }

    function marketStopTimer() {
        if (marketTimer) { clearInterval(marketTimer); marketTimer = null; }
    }

    function renderMarketBreadth() {
        var wrap = document.getElementById('market-ad-wrap');
        if (!wrap || !snapshot || !snapshot.by_industry) return;

        var adv = 0, dec = 0, unch = 0;
        Object.values(snapshot.by_industry).forEach(function(rows) {
            rows.forEach(function(r) {
                if (r.daily == null) return;
                if (r.daily > 0)      adv++;
                else if (r.daily < 0) dec++;
                else                  unch++;
            });
        });

        var total   = adv + dec + unch;
        if (!total) { wrap.innerHTML = '<div style="color:#484f58;font-size:0.858em;">No data.</div>'; return; }

        var advPct  = (adv  / total * 100).toFixed(1);
        var decPct  = (dec  / total * 100).toFixed(1);
        var unPct   = (unch / total * 100).toFixed(1);
        var ratio   = dec > 0 ? (adv / dec).toFixed(2) : '—';
        var net     = adv - dec;
        var netCl   = net > 0 ? 'up' : net < 0 ? 'down' : '';
        var netStr  = (net >= 0 ? '+' : '') + net;

        // Bar widths — proportional, unch gets minimum visual space if > 0
        var advW  = (adv  / total * 100).toFixed(2) + '%';
        var decW  = (dec  / total * 100).toFixed(2) + '%';
        var unW   = (unch / total * 100).toFixed(2) + '%';

        wrap.innerHTML =
            '<div class="market-ad-row">' +
                '<div class="market-ad-side-adv">' +
                    '<div class="market-ad-label adv">Advancing</div>' +
                    '<div class="market-ad-count adv">' + adv.toLocaleString() + ' <span class="market-ad-pct">(' + advPct + '%)</span></div>' +
                '</div>' +
                '<div class="market-ad-bar-wrap">' +
                    '<div class="market-ad-bar-adv"  style="width:' + advW + '"></div>' +
                    (unch ? '<div class="market-ad-bar-unch" style="width:' + unW + '"></div>' : '') +
                    '<div class="market-ad-bar-dec"  style="width:' + decW + '"></div>' +
                '</div>' +
                '<div class="market-ad-side-dec">' +
                    '<div class="market-ad-label dec">Declining</div>' +
                    '<div class="market-ad-count dec">' + dec.toLocaleString() + ' <span class="market-ad-pct">(' + decPct + '%)</span></div>' +
                '</div>' +
            '</div>' +
            '<div class="market-ad-ratio">' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">A/D Ratio</span><span class="market-ad-stat-val ' + netCl + '">' + ratio + '</span></div>' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">Net</span><span class="market-ad-stat-val ' + netCl + '">' + netStr + '</span></div>' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">Unchanged</span><span class="market-ad-stat-val">' + unch + '</span></div>' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">Total</span><span class="market-ad-stat-val">' + total.toLocaleString() + '</span></div>' +
            '</div>';
    }

    function renderMarketHL() {
        var wrap = document.getElementById('market-hl-wrap');
        if (!wrap || !snapshot || !snapshot.by_industry) return;

        var nh = 0, nl = 0, total = 0;
        Object.values(snapshot.by_industry).forEach(function(rows) {
            rows.forEach(function(r) {
                total++;
                if (r.new_52wk_high === true) nh++;
                if (r.new_52wk_low  === true) nl++;
            });
        });

        if (!total) { wrap.innerHTML = '<div style="color:#484f58;font-size:0.858em;">No data.</div>'; return; }

        var nhPct  = (nh / total * 100).toFixed(1);
        var nlPct  = (nl / total * 100).toFixed(1);
        var net    = nh - nl;
        var netCl  = net > 0 ? 'up' : net < 0 ? 'down' : '';
        var netStr = (net >= 0 ? '+' : '') + net;
        var ratio  = nl > 0 ? (nh / nl).toFixed(2) : nh > 0 ? '∞' : '—';

        // Bar: NH green on left, rest grey, NL red on right
        var nhW = (nh / total * 100).toFixed(2) + '%';
        var nlW = (nl / total * 100).toFixed(2) + '%';

        wrap.innerHTML =
            '<div class="market-ad-row">' +
                '<div class="market-ad-side-adv">' +
                    '<div class="market-ad-label adv">New Highs</div>' +
                    '<div class="market-ad-count adv">' + nh.toLocaleString() + ' <span class="market-ad-pct">(' + nhPct + '%)</span></div>' +
                '</div>' +
                '<div class="market-ad-bar-wrap">' +
                    '<div class="market-ad-bar-adv" style="width:' + nhW + '"></div>' +
                    '<div class="market-ad-bar-unch" style="flex:1"></div>' +
                    '<div class="market-ad-bar-dec" style="width:' + nlW + '"></div>' +
                '</div>' +
                '<div class="market-ad-side-dec">' +
                    '<div class="market-ad-label dec">New Lows</div>' +
                    '<div class="market-ad-count dec">' + nl.toLocaleString() + ' <span class="market-ad-pct">(' + nlPct + '%)</span></div>' +
                '</div>' +
            '</div>' +
            '<div class="market-ad-ratio">' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">H/L Ratio</span><span class="market-ad-stat-val ' + netCl + '">' + ratio + '</span></div>' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">Net</span><span class="market-ad-stat-val ' + netCl + '">' + netStr + '</span></div>' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">Neither</span><span class="market-ad-stat-val">' + (total - nh - nl).toLocaleString() + '</span></div>' +
                '<div class="market-ad-stat"><span class="market-ad-stat-label">Total</span><span class="market-ad-stat-val">' + total.toLocaleString() + '</span></div>' +
            '</div>';
    }

    function maZoneDir(pct)   { return pct >= 60 ? 'up' : pct <= 40 ? 'down' : 'flat'; }
    function maZoneLabel(pct) { return pct >= 60 ? 'Bullish' : pct <= 40 ? 'Bearish' : 'Neutral'; }
    function maBarColor(dir)  { return dir === 'up' ? '#3fb950' : dir === 'down' ? '#f85149' : '#484f58'; }
    function maFmtNet(n)      { return (n >= 0 ? '+' : '') + n.toLocaleString(); }

    function renderMarketMA() {
        if (!snapshot || !snapshot.by_industry) return;

        var sma5 = 0, ema21 = 0, sma50a = 0, sma50b = 0, sma200a = 0, sma200b = 0, total = 0;

        Object.values(snapshot.by_industry).forEach(function(rows) {
            rows.forEach(function(r) {
                var dm = r.dist_ma;
                if (!dm) return;
                total++;
                var above50 = dm.SMA50 != null && dm.SMA50 > 0;
                if (dm.SMA5  != null && dm.SMA5  > 0 && above50) sma5++;
                if (dm.EMA21 != null && dm.EMA21 > 0 && above50) ema21++;
                if (dm.SMA50  != null) { if (dm.SMA50  > 0) sma50a++;  else sma50b++;  }

            sel.innerHTML =

                        '</div>' +
                        '<div style="display:flex;flex-direction:column;gap:1px;align-items:flex-end;">' +
                            '<div style="font-size:9px;color:#484f58;text-transform:uppercase;letter-spacing:0.05em;">Zone</div>' +
                            '<div style="font-size:11px;font-weight:700;" class="ma-zone ' + ddir + '">' + maZoneLabel(Math.round(ab / stot * 100)) + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
        }
    }

    // ── Load data ─────────────────────────────────────────────────────────
    Promise.all([
        fetch('data/snapshot.json').then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
        fetch('data/industries.json').then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; }),
    ]).then(function(res) {
        snapshot       = res[0];
        industriesData = res[1];

        document.getElementById('loading-msg').style.display = 'none';

        // Sync DistMA buttons
        document.querySelectorAll('.dist-ma-type-btn').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-type') === activeMAType); });
        document.querySelectorAll('.dist-ma-len-btn').forEach(function(b){ b.classList.toggle('active', parseInt(b.getAttribute('data-len')) === activeMALength); });

        showView('industries');
        wlAttachListeners();

        // Scans dblclick — attached once on the static container
        document.getElementById('scans-table-view').addEventListener('dblclick', function(e) {
            var row = e.target.closest('.stock-row');
            if (!row) return;
            openChartModal(row.getAttribute('data-symbol'), row.getAttribute('data-sector')||'', row.getAttribute('data-industry')||'');
        });
    });
})();
</script>
</body>
</html>
